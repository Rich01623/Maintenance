<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTSMaintenance | Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --fleet-red: #e11d48; --fleet-amber: #f59e0b; --fleet-green: #10b981; --bg-main: #0f172a; --sidebar-bg: #1e293b; --card-bg: #1e293b; --text-main: #f1f5f9; --border-color: #334155; }
        .light { --bg-main: #f8fafc; --sidebar-bg: #ffffff; --card-bg: #ffffff; --text-main: #0f172a; --border-color: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); transition: all 0.3s ease; display: flex; height: 100vh; overflow: hidden; font-size: 16px; }
        
        /* Login Screen Styles */
        #login-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .login-box { width: 100%; max-width: 400px; padding: 2.5rem; background: #1e293b; border-radius: 1.5rem; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        aside { width: 340px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 1.25rem; height: 100vh; flex-shrink: 0; z-index: 50; }
        main { flex-grow: 1; height: 100vh; overflow-y: auto; padding: 1.5rem; position: relative; }
        .nav-link { width: 100%; text-align: left; padding: 0.85rem 1.25rem; border-radius: 0.75rem; font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; color: #94a3b8; transition: all 0.2s; display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .nav-link.active { background: var(--fleet-red); color: white; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3); }
        .nav-link:hover:not(.active) { background: rgba(255,255,255,0.05); color: #f1f5f9; }
        .glass-card { background: var(--card-bg); border: 1px solid var(--border-color); box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.1); transition: all 0.2s ease; position: relative; overflow: hidden; padding: 1rem !important; }
        .plate-badge { font-weight: 800; padding: 4px 12px; border-radius: 6px; font-size: 0.95rem; display: inline-flex; color: #fff; }
        .plate-ok { background: var(--fleet-green); }
        .plate-warn { background: var(--fleet-amber); color: #000; }
        .plate-critical { background: var(--fleet-red); }
        .btn-action { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); transition: all 0.3s ease; position: relative; z-index: 20; }
        .btn-history { background: rgba(51, 65, 85, 0.5); color: #cbd5e1; }
        .btn-pdf { background: #0ea5e9; color: white; border-color: #0ea5e9; }
        .btn-compliance { background: var(--fleet-red); color: white; width: 100%; font-size: 10px; font-weight: 900; padding: 6px; border-radius: 4px; margin-top: 2px; text-transform: uppercase; border: none; cursor: pointer; }
        .label-heading { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; display: block; letter-spacing: 0.025em; }
        input[type="date"], .input-text, .login-input { background: rgba(0,0,0,0.1); border-radius: 4px; padding: 4px 6px; border: 1px solid var(--border-color); color: inherit; font-size: 0.9rem; font-weight: 600; width: 100%; outline: none; }
        .login-input { padding: 0.75rem 1rem; margin-bottom: 1rem; background: #0f172a; border-radius: 0.75rem; }
        .week-display { background: #334155; padding: 4px 6px; border-radius: 4px; font-size: 0.9rem; font-weight: 800; color: #fff; text-align: center; border: 1px solid #475569; width: 100%; margin-top: 2px; display: block; }
        .defect-active { background: var(--fleet-amber); color: #000; border-color: var(--fleet-amber); animation: pulse-border 2s infinite; cursor: pointer; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
        .vor-stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); border: 4px solid var(--fleet-red); color: var(--fleet-red); padding: 4px 18px; font-weight: 900; font-size: 1.5rem; opacity: 0; pointer-events: none; background: var(--card-bg); z-index: 10; }
        .card-vor .vor-stamp { opacity: 0.9; }
        .card-vor .content-fade { opacity: 0.3; filter: grayscale(1); }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
        .folder-card { cursor: pointer; border-left: 4px solid var(--fleet-red); }
        .breadcrumb-item { cursor: pointer; color: #94a3b8; transition: color 0.2s; }
        .breadcrumb-item:hover { color: #e11d48; }
        
        .defect-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .defect-table th { text-align: left; padding: 12px; background: rgba(225, 29, 72, 0.1); color: var(--fleet-red); font-weight: 800; text-transform: uppercase; font-size: 11px; border-bottom: 2px solid var(--border-color); }
        .defect-table td { padding: 12px; border-bottom: 1px solid var(--border-color); vertical-align: top; }
        .defect-row:hover { background: rgba(255,255,255,0.02); }

        .sub-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .sub-nav-btn { padding: 6px 16px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid var(--border-color); color: #94a3b8; transition: 0.2s; }
        .sub-nav-btn.active { background: var(--fleet-red); color: white; border-color: var(--fleet-red); }

        /* Modal Animation */
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        
        /* Custom Scrollbar for Calendar & History */
        .planner-scroll::-webkit-scrollbar { height: 10px; width: 10px; }
        .planner-scroll::-webkit-scrollbar-track { background: var(--bg-main); border-radius: 8px; }
        .planner-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }
        .planner-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Force Calendar Icon to white in dark mode */
        .dark ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
        .dark ::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    </style>
</head>
<body class="dark">

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 class="text-3xl font-black uppercase mb-2 text-center">FTS<span class="text-rose-600">Login</span></h2>
            <p class="text-slate-500 text-xs text-center font-bold uppercase mb-8 tracking-widest">Management Portal Access</p>
            
            <label class="label-heading">Email Address</label>
            <input type="email" id="login-email" class="login-input" placeholder="name@fts.com">
            
            <label class="label-heading">Password</label>
            <input type="password" id="login-password" class="login-input" placeholder="••••••••">
            
            <button id="login-btn" onclick="handleLogin()" class="w-full bg-rose-600 text-white py-4 rounded-xl font-black uppercase hover:bg-rose-500 transition-all shadow-lg shadow-rose-600/20 mt-4">Sign In</button>
            <p id="login-error" class="text-rose-500 text-[10px] font-bold text-center mt-4 hidden uppercase"></p>
        </div>
    </div>

    <!-- ISO WEEK CALCULATOR MODAL -->
    <div id="iso-week-modal" class="fixed inset-0 z-[10000] hidden flex items-center justify-center transition-opacity" style="background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px);">
        <div class="glass-card w-full max-w-sm p-6 relative animate-fade-in" style="background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color);">
            <button onclick="closeIsoWeekModal()" class="absolute top-4 right-4 text-slate-400 hover:text-rose-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="flex items-center gap-3 mb-6">
                <div class="p-2 rounded-lg bg-amber-500/10 text-amber-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <h3 class="text-xl font-black uppercase tracking-tight text-white">ISO Week Calc</h3>
            </div>
            
            <label class="label-heading mb-2">Select a Date</label>
            <input type="date" id="iso-calc-input" class="input-text mb-6 w-full text-lg p-3" onchange="calculateIsoWeek()">
            
            <div class="text-center p-6 rounded-xl border border-dashed border-slate-600 bg-slate-800/50">
                <span class="block text-[10px] font-bold uppercase tracking-[0.2em] mb-2 text-slate-400">Calculated Week</span>
                <span id="iso-calc-result" class="text-4xl font-black text-rose-500">--</span>
            </div>
        </div>
    </div>

    <!-- DOCUMENT LIGHTBOX MODAL -->
    <div id="lightbox-modal" class="fixed inset-0 z-[10000] hidden flex flex-col transition-opacity" style="background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px);">
        <div class="flex justify-between items-center p-4 bg-slate-900 border-b border-slate-700">
            <h3 class="text-white font-black uppercase tracking-widest text-sm">Document Viewer</h3>
            <button onclick="closeLightbox()" class="text-slate-400 hover:text-white transition-colors bg-slate-800 p-2 rounded-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="flex-grow p-4 md:p-8 flex items-center justify-center relative">
            <div id="lightbox-loader" class="absolute inset-0 flex items-center justify-center z-0">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-rose-600 border-t-transparent"></div>
            </div>
            <iframe id="lightbox-frame" class="w-full h-full rounded-xl border border-slate-700 bg-white shadow-2xl relative z-10" onload="document.getElementById('lightbox-loader').classList.add('hidden')"></iframe>
        </div>
    </div>

    <!-- AUDIT HISTORY MODAL -->
    <div id="history-modal" class="fixed inset-0 z-[10000] hidden flex items-center justify-center transition-opacity" style="background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px);">
        <div class="glass-card w-full max-w-3xl p-6 relative animate-fade-in flex flex-col" style="background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--border-color); max-height: 85vh;">
            <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4 shrink-0">
                <div class="flex items-center gap-4">
                    <div class="p-3 rounded-xl bg-indigo-500/10 text-indigo-500 shadow-inner">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black uppercase tracking-tight text-white" id="history-modal-title">Audit History</h3>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1" id="history-modal-subtitle">Loading...</p>
                    </div>
                </div>
                <button onclick="closeHistoryModal()" class="text-slate-400 hover:text-rose-500 transition-colors bg-slate-800 hover:bg-slate-700 p-2.5 rounded-xl border border-slate-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="history-content" class="overflow-y-auto pr-3 flex-grow space-y-4 planner-scroll">
                <!-- Dynamic content injects here -->
            </div>
        </div>
    </div>

    <aside id="main-sidebar" class="hidden">
        <div class="mb-4">
            <h1 class="text-2xl font-black uppercase mb-1">FTS<span class="text-rose-600">Maintenance</span></h1>
            <div class="flex items-center gap-2 flex-wrap">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-black">● Live Sync</p>
                <span id="current-week-badge" class="text-[10px] px-2 py-0.5 rounded bg-rose-600/20 text-rose-500 font-black border border-rose-600/30">WEEK --</span>
            </div>
        </div>
        
        <nav class="mb-3">
            <button id="nav-vehicle" onclick="switchTab('vehicle')" class="nav-link active">VEHICLES</button>
            <button id="nav-trailer" onclick="switchTab('trailer')" class="nav-link">TRAILERS</button>
            <button id="nav-tyres" onclick="switchTab('tyres')" class="nav-link">TYRES & WHEELS</button>
            <button id="nav-forklift" onclick="switchTab('forklift')" class="nav-link">FORKLIFTS</button>
            <button id="nav-planner" onclick="switchTab('planner')" class="nav-link">PLANNER</button>
            <button id="nav-jcc" onclick="switchTab('jcc')" class="nav-link flex justify-between items-center">
                <span>FROST CONNECT</span>
                <span id="auth-badge" class="hidden bg-rose-600 text-white text-[10px] px-2 py-0.5 rounded-full font-black animate-pulse shadow-[0_0_10px_rgba(225,29,72,0.6)]">!</span>
            </button>
            <button id="nav-defects" onclick="switchTab('defects')" class="nav-link">DEFECTS</button>

            <!-- UPLOAD DOCUMENTS BUTTON -->
            <a href="https://rich01623.github.io/JCCPortal/" target="_blank" class="nav-link flex justify-between items-center mt-2">
                <span>UPLOAD DOCS</span>
                <svg class="w-4 h-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            </a>
        </nav>

        <div class="flex-grow flex flex-col min-h-0 pt-2 border-t border-slate-700">
            <!-- Audit Trail Removed per request, freeing up space -->
        </div>

        <div class="pt-3 mt-3">
            <div class="bg-slate-800/40 p-2 px-3 rounded-lg mb-2 flex justify-between items-center" id="stat-container">
                <span id="stat-label" class="text-[11px] text-slate-500 font-bold uppercase">Total Units</span>
                <span id="stat-total" class="text-lg font-black">--</span>
            </div>
            
            <!-- PULL WEEK REPORT BUTTON -->
            <button id="btn-pull-week" onclick="window.pullWeekReport()" class="w-full bg-slate-700 text-white py-2.5 rounded-xl text-[11px] font-black hover:bg-slate-600 transition-all uppercase mb-1.5">Pull Week Report</button>
            
            <button id="btn-fleet-report" onclick="generateFullFleetPDF()" class="w-full bg-slate-700 text-white py-2.5 rounded-xl text-[11px] font-black hover:bg-slate-600 transition-all uppercase mb-1.5">Generate Fleet Report</button>
            <button id="add-unit-btn" onclick="window.addNewUnit()" class="w-full bg-rose-600 text-white py-2.5 rounded-xl text-sm font-bold hover:bg-rose-500 transition-all uppercase mb-1.5">+ Add Unit</button>
            <button onclick="handleLogout()" class="w-full text-slate-500 py-1.5 text-[10px] font-black uppercase hover:text-rose-500 transition-colors">Sign Out</button>
        </div>
    </aside>

    <main id="main-content" class="hidden">
        
        <!-- Live Fleet Search & Global Top Controls Header -->
        <div id="header-area" class="mb-6 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
            
            <!-- JCC Header Left side (Breadcrumbs) -->
            <div id="jcc-header-left" class="hidden flex items-center gap-4">
                <button id="jcc-back" onclick="navigateUp()" class="hidden bg-slate-800 text-slate-300 px-4 py-2 rounded-lg font-bold text-xs uppercase hover:bg-slate-700">← Back</button>
                <div id="breadcrumb-container" class="flex items-center gap-2 text-sm font-black uppercase text-slate-400">
                    <span>Frost Docs</span>
                </div>
            </div>
            
            <!-- Fleet Header Left side (Title) -->
            <div id="fleet-header-left" class="flex-grow">
                <h2 id="view-title" class="text-2xl font-black uppercase text-white tracking-widest hidden md:block">VEHICLES</h2>
            </div>
            
            <!-- Right side global controls -->
            <div class="flex flex-wrap items-center gap-2 w-full md:w-auto justify-end ml-auto">
                
                <!-- Sorting Toggle -->
                <div id="top-sorting" class="flex bg-slate-800 p-1 rounded-lg border border-slate-700 h-10 items-center">
                    <button id="sort-alpha" onclick="setSort('alpha')" class="px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest transition-all bg-rose-600 text-white shadow-md">A-Z</button>
                    <button id="sort-date" onclick="setSort('date')" class="px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-white">DUE</button>
                </div>
                
                <!-- ISO Calculator -->
                <button onclick="openIsoWeekModal()" class="flex items-center justify-center bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-3 h-10 rounded-lg transition-colors" title="ISO Week Calculator">
                    <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span class="ml-2 text-[10px] font-black uppercase tracking-widest hidden lg:block">ISO Calc</span>
                </button>
                
                <!-- Day/Night Toggle -->
                <button onclick="toggleMode()" class="flex items-center justify-center bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-3 h-10 rounded-lg transition-colors text-lg" title="Toggle Day/Night">
                    ◐
                </button>

                <!-- JCC Search Bar -->
                <input type="text" id="jcc-search" oninput="filterGrid(this.value)" placeholder="Search files..." class="hidden bg-slate-800 border border-slate-700 px-4 h-10 rounded-xl text-sm font-bold text-white outline-none focus:border-rose-600 transition-colors shadow-lg w-full sm:w-64">

                <!-- Fleet Search Bar -->
                <div class="relative w-full sm:w-64" id="search-container">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="fleet-search" oninput="filterGrid(this.value)" placeholder="Search Fleet Reg, Driver, or VIN..." class="pl-10 w-full h-10 bg-slate-800 border border-slate-700 px-4 rounded-xl text-sm font-bold text-white outline-none focus:border-rose-600 transition-colors shadow-lg">
                </div>
                
            </div>
        </div>

        <div id="fleet-grid" class="grid-layout"></div>
    </main>

    <input type="file" id="compliance-upload-hidden" class="hidden" accept=".pdf,.jpg,.jpeg,.png">

    <script>
        const SB_URL = 'https://mbudwnwxucluwgbkgbfx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q';
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentTab = 'vehicle';
        let defectView = 'active'; 
        let plannerView = 'vehicles';
        let sortMode = 'alpha';
        let cachedChecks = [];
        let cachedVehicles = [];
        let cachedTrailers = [];
        let cachedForklifts = [{ registration_number: 'FLT-01' }, { registration_number: 'FLT-02' }];
        let activeUploadData = null;
        let currentPath = []; 
        let currentUserEmail = 'Unknown User'; 

        // TARGET UNITS FOR LOLER
        const lolerVehicles = ['FD65VZA', 'HS19VNH'];
        const lolerTrailers = ['FTSTR30', 'FTSTR31', 'FTSTR32'];

        // --- AUTH LOGIC ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            loginBtn.innerText = "AUTHENTICATING...";
            errorEl.classList.add('hidden');

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.innerText = error.message;
                errorEl.classList.remove('hidden');
                loginBtn.innerText = "SIGN IN";
            } else {
                currentUserEmail = email;
                showApp();
            }
        }

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUserEmail = session.user.email;
                showApp();
            }
        }

        function showApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            loadFleet();
            setInterval(checkAuthQueue, 30000);
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        function toggleMode() { 
            document.documentElement.classList.toggle('light'); 
            document.documentElement.classList.toggle('dark'); 
        }

        // --- NOTIFICATION QUEUE LOGIC ---
        async function checkAuthQueue() {
            try {
                const { data } = await supabaseClient.storage.from('maintenance_docs').list('AUTHORISE', { limit: 100 });

        function calculateIsoWeek() {
            const dateVal = document.getElementById('iso-calc-input').value;
            if (!dateVal) {
                document.getElementById('iso-calc-result').innerText = "--";
                return;
            }
            const week = getWeekNumber(new Date(dateVal));
            document.getElementById('iso-calc-result').innerText = `Week ${week}`;
        }
        
        function getWeekNumber(dateInput) {
            if (!dateInput) return null;
            const d = new Date(dateInput);
            if (isNaN(d)) return null;
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(), 0, 1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function getDateFromISOWeek(week, year) {
            const simple = new Date(year, 0, 1 + (week - 1) * 7, 12, 0, 0);
            const dow = simple.getDay();
            const ISOweekStart = simple;
            if (dow <= 4)
                ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else
                ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            return ISOweekStart;
        }

        // --- RECURRING DATES CALCULATOR ---
        function getRecurringWY(dStr, intervalWeeks) {
            if(!dStr) return [];
            const baseDate = new Date(dStr);
            if(isNaN(baseDate)) return [];
            
            if (intervalWeeks === 0) {
                let w = getWeekNumber(baseDate);
                let y = baseDate.getFullYear();
                if (w === 1 && baseDate.getMonth() === 11) y++;
                if (w >= 52 && baseDate.getMonth() === 0) y--;
                return [{ w, y }];
            }

            const results = [];
            let currentD = new Date(baseDate);
            const limitDate = new Date();
            limitDate.setDate(limitDate.getDate() - (12 * 7)); 

            while (currentD < limitDate) {
                currentD.setDate(currentD.getDate() + (intervalWeeks * 7));
            }

            for(let i = 0; i < 10; i++) {
                const futureD = new Date(currentD);
                futureD.setDate(futureD.getDate() + (i * intervalWeeks * 7));
                
                let w = getWeekNumber(futureD);
                let y = futureD.getFullYear();
                if (w === 1 && futureD.getMonth() === 11) y++;
                if (w >= 52 && futureD.getMonth() === 0) y--;
                
                results.push({ w, y });
            }
            return results;
        }

            doc.text(`FTS 6-MONTH PLANNER - ${plannerView.toUpperCase()}`, 14, 15);
            
            // Add Legend
            doc.setFontSize(8);
            doc.setTextColor(100);
            doc.text("Legend: P = PMI (Blue) | B = Brake Test (Red) | M = MOT (Green) | T = Tacho (Purple) | Multiple = Grey", doc.internal.pageSize.width - 14, 15, { align: 'right' });

            const today = new Date();
            for(let i = 0; i < 26; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() + (i * 7));
                let w = getWeekNumber(d);
                let y = d.getFullYear();
                if (w === 1 && d.getMonth() === 11) y++;
                if (w >= 52 && d.getMonth() === 0) y--;
                weeks.push({ w, y, label: `W${w}` });
            }

            let fleet = plannerView === 'vehicles' ? [...cachedVehicles] : [...cachedTrailers];
            fleet.sort((a,b) => a.registration_number.localeCompare(b.registration_number));

            const head = [['Unit ID', ...weeks.map(wk => wk.label)]];
            const body = [];

            fleet.forEach(v => {
                const pmis = getRecurringWY(v.pmi_due, 6);
                const brakes = getRecurringWY(v.brake_test, 6);
                const mots = getRecurringWY(v.mot_due, 0);
                const tachos = getRecurringWY(v.tachograph_service_due, 0);

                const row = [v.registration_number];
                weeks.forEach(wk => {
                    let tasks = [];
                    if(pmis.some(p => p.w === wk.w && p.y === wk.y)) tasks.push('P');
                    if(brakes.some(b => b.w === wk.w && b.y === wk.y)) tasks.push('B');
                    if(mots.some(m => m.w === wk.w && m.y === wk.y)) tasks.push('M');
                    if(plannerView === 'vehicles' && tachos.some(t => t.w === wk.w && t.y === wk.y)) tasks.push('T');
                    
                    row.push(tasks.join(', '));
                });
                body.push(row);
            });

            doc.autoTable({
                theme: 'grid',
                startY: 22,
                head: head,
                body: body,
                headStyles: { fillColor: [225, 29, 72], fontSize: 6, halign: 'center', lineWidth: 0.1, lineColor: [200, 200, 200] },
                bodyStyles: { fontSize: 6, halign: 'center', lineWidth: 0.1, lineColor: [200, 200, 200] },

                styles: { cellPadding: 1.5, overflow: 'linebreak' },
                margin: { left: 10, right: 10 },
                didParseCell: function(data) {
                    if (data.section === 'body' && data.column.index > 0) {
                        const text = data.cell.raw;
                        if (text) {
                            data.cell.styles.textColor = [255, 255, 255];
                            data.cell.styles.fontStyle = 'bold';
                            if (text.includes(',')) {
                                data.cell.styles.fillColor = [71, 85, 105]; // Slate
                            } else if (text === 'P') {
                                data.cell.styles.fillColor = [59, 130, 246]; // Blue
                            } else if (text === 'B') {
                                data.cell.styles.fillColor = [244, 63, 94]; // Red
                            } else if (text === 'M') {
                                data.cell.styles.fillColor = [34, 197, 94]; // Green
                            } else if (text === 'T') {
                                data.cell.styles.fillColor = [168, 85, 247]; // Purple
                            }
                        }
                    }
                }
            });

            addFooterToPDF(doc);
            doc.save(`FTS_Planner_${plannerView.toUpperCase()}_${Date.now()}.pdf`);
