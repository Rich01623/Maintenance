                            <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                        <h3 class="text-xl font-black text-white uppercase tracking-widest mb-2">Module In Development</h3>
                        <p class="text-slate-500 font-bold text-sm">The Tyres & Wheels management feature is currently being built and will be available in a future update.</p>
                    </div>`;
                return;
            }

            if (currentTab === 'forklift') {
                const targetFLTs = ['FLT-01', 'FLT-02'];
                const fltData = cachedVehicles.filter(v => targetFLTs.includes(v.registration_number));
                
                const displayFLTs = targetFLTs.map(reg => {
                    const found = fltData.find(v => v.registration_number === reg);
                    return found || { registration_number: reg, vin_number: '', is_vor: false, vor_reason: '' };
                });

                document.getElementById('stat-total').innerText = displayFLTs.length;

                displayFLTs.forEach(v => {
                    const table = 'vehicles';
                    const card = document.createElement('div');
                    card.className = `glass-card rounded-xl ${v.is_vor ? 'card-vor' : ''}`;
                    card.setAttribute('data-search', `${v.registration_number} ${v.vin_number || ''}`);
                    
                    let vorStampHTML = '<div class="vor-stamp">OFF ROAD</div>';
                    if (v.is_vor) {
                        vorStampHTML = `
                            <div class="vor-stamp" style="width: 85%; max-width: 250px; text-align: center;">
                                <div>OFF ROAD</div>
                                ${v.vor_reason ? `<div class="text-[11px] font-bold tracking-normal leading-tight mt-2 pt-1 border-t-[3px] border-rose-600 break-words whitespace-normal">${v.vor_reason}</div>` : ''}
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        ${vorStampHTML}
                        <div class="flex justify-between items-center mb-3 relative z-30">
                            <div class="flex flex-wrap items-center gap-1.5">
                                <div class="plate-badge plate-ok">${v.registration_number}</div>
                                <button onclick="generatePDF('${v.registration_number}')" class="btn-action btn-pdf">PDF</button>
                                <button onclick="generateReport('${v.registration_number}', true)" class="btn-action btn-history">History</button>
                            </div>
                            <button onclick="toggleVOR_Action('${v.registration_number}', ${v.is_vor || false}, '${table}')" class="btn-action ${v.is_vor ? 'text-rose-500 font-black' : 'text-slate-500'}">${v.is_vor ? '● VOR' : '○ Active'}</button>
                        </div>
                        <div class="content-fade">
                            <div class="mb-3"><span class="label-heading">Serial Number (VIN)</span><input type="text" class="input-text" value="${v.vin_number || ''}" onchange="supabaseClient.from('vehicles').upsert({ registration_number: '${v.registration_number}', vin_number: this.value }).then(()=>loadFleet())"></div>
                            <div class="grid grid-cols-1 gap-3 mt-4">
                                <div class="p-4 rounded-xl border border-dashed border-slate-700 bg-slate-800/30 text-center">
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Compliance Fields In Development</p>
                                </div>
                            </div>
                        </div>`;
                    grid.appendChild(card);
                });
                return;
            }

            // --- DEFECTS TAB LOGIC ---
            if (currentTab === 'defects') {
                let defectReports = [];
                
                if (defectView === 'active') {
                    let seenActive = new Set();
                    let resolvedSet = new Set();

                    cachedChecks.forEach(c => {
                        const unitID = c.registration || c.trailer_number || 'N/A';
                        const rawText = c.defect_details || '';
                        const originalText = rawText.split('--- RESOLVED ---')[0].toLowerCase().replace(/\s+/g, ' ').trim();
                        const key = `${unitID}::${originalText}`;

                        const isResolved = c.condition_status && c.condition_status.toLowerCase().includes('resolved');
                        const isDefect = c.condition_status && c.condition_status.toLowerCase().includes('defect') && !c.condition_status.toLowerCase().includes('nil') && !isResolved;

                        if (isResolved) {
                            resolvedSet.add(key);
                        } else if (isDefect) {
                            if (!resolvedSet.has(key) && !seenActive.has(key)) {
                                seenActive.add(key);
                                defectReports.push(c);
                            }
                        }
                    });
                } else {
                    let seenHistory = new Set();
                    cachedChecks.forEach(c => {
                        const isResolved = c.condition_status && c.condition_status.toLowerCase().includes('resolved');
                        if (isResolved) {
                            const unitID = c.registration || c.trailer_number || 'N/A';
                            const rawText = c.defect_details || '';
                            const originalText = rawText.split('--- RESOLVED ---')[0].toLowerCase().replace(/\s+/g, ' ').trim();
                            const key = `${unitID}::${originalText}`;

                            if (!seenHistory.has(key)) {
                                seenHistory.add(key);
                                defectReports.push(c);
                            }
                        }
                    });
                }

                document.getElementById('stat-total').innerText = defectReports.length;

                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'col-span-full mb-2';
                sectionHeader.innerHTML = `
                    <div class="sub-nav">
                        <button onclick="setDefectView('active')" class="sub-nav-btn ${defectView === 'active' ? 'active' : ''}">Active Defects</button>
                        <button onclick="setDefectView('history')" class="sub-nav-btn ${defectView === 'history' ? 'active' : ''}">History</button>
                    </div>
                `;
                grid.appendChild(sectionHeader);

                if (defectReports.length === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.className = 'glass-card p-8 text-center text-slate-500 font-bold uppercase col-span-full';
                    emptyMsg.innerText = defectView === 'active' ? 'No Active Defects Reported' : 'No Resolved History Found';
                    grid.appendChild(emptyMsg);
                    return;
                }

                const tableContainer = document.createElement('div');
                tableContainer.className = 'glass-card col-span-full overflow-x-auto';
                
                let tableHTML = `
                    <table class="defect-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Unit ID</th>
                                <th>Driver Name</th>
                                <th>Details</th>
                                <th style="text-align:right">${defectView === 'active' ? 'Action' : 'Status'}</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                defectReports.forEach(report => {
                    const date = new Date(report.created_at).toLocaleDateString('en-GB');
                    const unitID = report.registration || report.trailer_number || 'N/A'; 
                    // Add data-search attribute for the search bar
                    tableHTML += `
                        <tr class="defect-row" data-search="${unitID} ${report.driver_name} ${report.defect_details}">
                            <td class="font-black text-slate-400 whitespace-nowrap">${date}</td>
                            <td><span class="plate-badge plate-critical">${unitID}</span></td>
                            <td class="font-bold uppercase whitespace-nowrap">${report.driver_name || 'Unknown'}</td>
                            <td class="text-slate-300 italic text-xs" style="max-width:300px; white-space: pre-wrap;">${report.defect_details || 'No details'}</td>
                            <td style="text-align:right">
                                ${defectView === 'active' ? 
                                    `<button onclick="resolveDefect('${report.id}', \`${report.defect_details || ''}\`, '${report._origin}')" class="btn-action bg-green-600 text-white border-none">Mark Resolved</button>` : 
                                    `<span class="text-[9px] font-black text-green-500 uppercase">Resolved</span>`
                                }
                            </td>
                        </tr>
                    `;
                });

                tableHTML += `</tbody></table>`;
                tableContainer.innerHTML = tableHTML;
                grid.appendChild(tableContainer);
                return;
            }

            // --- STANDARD VEHICLE/TRAILER TAB LOGIC ---
            let data = [];
            if(currentTab === 'vehicle') data = [...cachedVehicles];
            else if(currentTab === 'trailer') data = [...cachedTrailers];

            document.getElementById('stat-total').innerText = data.length;

            data.sort((a, b) => {
                // VOR logic: push to bottom
                if (a.is_vor && !b.is_vor) return 1;
                if (!a.is_vor && b.is_vor) return -1;
                
                // Normal sorting
                if (sortMode === 'alpha') {
                    return a.registration_number.localeCompare(b.registration_number);
                } else {
                    return getMinDate(a) - getMinDate(b);
                }
            });

            data.forEach(v => {
                const vReg = v.registration_number.replace(/\s+/g, '').toUpperCase();
                
                // Ensure we don't display FLT-01/FLT-02 inside the normal Vehicle tab
                if (vReg === 'FLT-01' || vReg === 'FLT-02') return;

                const latestCheck = cachedChecks.find(c => {
                    const checkID = (c.registration || c.trailer_number || '').replace(/\s+/g, '').toUpperCase();
                    return checkID === vReg;
                });
                let hasActiveDefect = latestCheck && latestCheck.condition_status.toLowerCase().includes('defect') && !latestCheck.condition_status.toLowerCase().includes('nil') && !latestCheck.condition_status.toLowerCase().includes('resolved');
                let isTrailer = cachedTrailers.some(t => t.registration_number === v.registration_number);
                let table = isTrailer ? 'trailers' : 'vehicles';
                
                // LOLER check
                const requiresLoler = isTrailer ? lolerTrailers.includes(vReg) : lolerVehicles.includes(vReg);

                const pmiWk = getWeekNumber(v.pmi_due);
                const brakeWk = getWeekNumber(v.brake_test);
                const isPmiDue = pmiWk !== null && pmiWk <= currentWeek;
                const isBrakeDue = brakeWk !== null && brakeWk <= currentWeek;

                // --- LOCKED COMPLIANCE FIELDS ---
                const motDateObj = v.mot_due ? new Date(v.mot_due) : null;
                const isMotDue = !motDateObj || (motDateObj - new Date()) / 86400000 < 28;
                const motDisplay = motDateObj ? motDateObj.toLocaleDateString('en-GB') : '--';

                const tachoDateObj = v.tachograph_service_due ? new Date(v.tachograph_service_due) : null;
                const isTachoDue = !tachoDateObj || (tachoDateObj - new Date()) / 86400000 < 28;
                const tachoDisplay = tachoDateObj ? tachoDateObj.toLocaleDateString('en-GB') : '--';

                const roadTaxDateObj = v.road_tax_due ? new Date(v.road_tax_due) : null;
                const isRoadTaxDue = !roadTaxDateObj || (roadTaxDateObj - new Date()) / 86400000 < 28;
                const roadTaxDisplay = roadTaxDateObj ? roadTaxDateObj.toLocaleDateString('en-GB') : '--';

                const lolerDateObj = v.loler_due ? new Date(v.loler_due) : null;
                const isLolerDue = !lolerDateObj || (lolerDateObj - new Date()) / 86400000 < 28;
                const lolerDisplay = lolerDateObj ? lolerDateObj.toLocaleDateString('en-GB') : '--';

                const card = document.createElement('div');
                card.className = `glass-card rounded-xl ${v.is_vor ? 'card-vor' : ''}`;
                // Setup search data attribute
                card.setAttribute('data-search', `${v.registration_number} ${v.vin_number || ''}`);
                
                let vehicleSpecifics = !isTrailer ? `
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <span class="label-heading">MOT Due</span>
                            ${isMotDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'mot_due', 'vehicles')" class="btn-compliance">Upload MOT</button>` : `<div class="week-display">${motDisplay}</div>`}
                        </div>
                        <div>
                            <span class="label-heading">PMI Week</span>
                            ${isPmiDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'pmi_due', 'vehicles')" class="btn-compliance">Upload PMI</button>` : `<div class="week-display">WEEK ${pmiWk || '--'}</div>`}
                        </div>
                        <div>
                            <span class="label-heading">Road Tax</span>
                            ${isRoadTaxDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'road_tax_due', 'vehicles')" class="btn-compliance">Upload Tax</button>` : `<div class="week-display">${roadTaxDisplay}</div>`}
                        </div>
                        <div>
                            <span class="label-heading">Brake Test Week</span>
                            ${isBrakeDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'brake_test', 'vehicles')" class="btn-compliance">Upload Brake</button>` : `<div class="week-display">WEEK ${brakeWk || '--'}</div>`}
                        </div>
                        ${requiresLoler ? `
                        <div>
                            <span class="label-heading">LOLER Due</span>
                            ${isLolerDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'loler_due', 'vehicles')" class="btn-compliance">Upload LOLER</button>` : `<div class="week-display">${lolerDisplay}</div>`}
                        </div>
                        ` : ''}
                    </div>
                    <div class="mt-3 pt-3 border-t border-slate-700/50 flex justify-between items-end">
                        <div class="flex-1">
                            <span class="label-heading">Tachograph Calibration</span>
                            ${isTachoDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'tachograph_service_due', 'vehicles')" class="btn-compliance max-w-[170px]">Upload Tacho</button>` : `<div class="week-display max-w-[170px]">${tachoDisplay}</div>`}
                        </div>
                ` : `
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <span class="label-heading">MOT Due</span>
                            ${isMotDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'mot_due', 'trailers')" class="btn-compliance">Upload MOT</button>` : `<div class="week-display">${motDisplay}</div>`}
                        </div>
                        <div>
                            <span class="label-heading">PMI Week</span>
                            ${isPmiDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'pmi_due', 'trailers')" class="btn-compliance">Upload PMI</button>` : `<div class="week-display">WEEK ${pmiWk || '--'}</div>`}
                        </div>
                        <div>
                            <span class="label-heading">Brake Test Week</span>
                            ${isBrakeDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'brake_test', 'trailers')" class="btn-compliance">Upload Brake</button>` : `<div class="week-display">WEEK ${brakeWk || '--'}</div>`}
                        </div>
                        ${requiresLoler ? `
                        <div>
                            <span class="label-heading">LOLER Due</span>
                            ${isLolerDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'loler_due', 'trailers')" class="btn-compliance">Upload LOLER</button>` : `<div class="week-display">${lolerDisplay}</div>`}
                        </div>
                        ` : '<div></div>'}
                    </div>
                    <div class="mt-3 pt-3 border-t border-slate-700/50 flex justify-between items-end"><div class="flex-grow"></div>
                `;

                let vorStampHTML = '<div class="vor-stamp">OFF ROAD</div>';
                if (v.is_vor) {
                    vorStampHTML = `
                        <div class="vor-stamp" style="width: 85%; max-width: 250px; text-align: center;">
                            <div>OFF ROAD</div>
                            ${v.vor_reason ? `<div class="text-[11px] font-bold tracking-normal leading-tight mt-2 pt-1 border-t-[3px] border-rose-600 break-words whitespace-normal">${v.vor_reason}</div>` : ''}
                        </div>
                    `;
                }

                card.innerHTML = `
                    ${vorStampHTML}
                    <div class="flex justify-between items-center mb-3 relative z-30">
                        <div class="flex flex-wrap items-center gap-1.5">
                            <div class="plate-badge ${getHealthStatus(v)}">${v.registration_number}</div>
                            <button onclick="generatePDF('${v.registration_number}')" class="btn-action btn-pdf">PDF</button>
                            <button onclick="generateReport('${v.registration_number}', true)" class="btn-action btn-history">History</button>
                            <button onclick="generateReport('${v.registration_number}', false)" class="btn-action ${hasActiveDefect ? 'defect-active' : ''}">${hasActiveDefect ? 'Defect' : 'Clear'}</button>
                        </div>
                        <button onclick="toggleVOR_Action('${v.registration_number}', ${v.is_vor}, '${table}')" class="btn-action ${v.is_vor ? 'text-rose-500 font-black' : 'text-slate-500'}">${v.is_vor ? '● VOR' : '○ Active'}</button>
                    </div>
                    <div class="content-fade">
                        <div class="mb-3"><span class="label-heading">VIN Number</span><input type="text" class="input-text" value="${v.vin_number || ''}" onchange="window.save('${v.registration_number}', 'vin_number', this.value, '${table}')"></div>
                        ${vehicleSpecifics}
                        <button onclick="window.removeUnit('${v.registration_number}', '${table}')" class="text-slate-600 hover:text-rose-500 transition-colors mb-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div></div>`;
                grid.appendChild(card);
            });
            
            const searchQuery = document.getElementById('fleet-search').value;
            if (searchQuery) filterGrid(searchQuery);
        }

        window.triggerUpload = (reg, field, table) => {
            activeUploadData = { reg, field, table };
            document.getElementById('compliance-upload-hidden').click();
        };

        // --- CONSOLIDATED UPLOAD INTERCEPTOR ---
        document.getElementById('compliance-upload-hidden').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !activeUploadData) return;
            const { reg, field, table } = activeUploadData;
            const cleanReg = reg.replace(/\s+/g, '').toUpperCase();
            const fileName = `${field}_WK${currentWeek}_${Date.now()}.${file.name.split('.').pop()}`;
            
            const authorizeFileName = `${cleanReg}---${table}---${field}---${fileName}`;
            const path = `AUTHORISE/${authorizeFileName}`;
            
            try {
                const { error: upErr } = await supabaseClient.storage.from('maintenance_docs').upload(path, file);
                if (upErr) throw upErr;

                await supabaseClient.from('maintenance_records').insert([{ 
                    vehicle_reg: cleanReg, 
                    document_type: field, 
                    file_path: path 
                }]);
                
                alert("File uploaded to Authorisation Queue.");
                loadFleet(); 
            } catch (err) { alert("Upload error: " + err.message); }
        };

        function getMinDate(v) {
            const d = [v.mot_due, v.pmi_due, v.road_tax_due, v.tachograph_service_due, v.brake_test, v.loler_due].filter(Boolean);
            if (d.length === 0) return new Date('2099-01-01');
            return new Date(Math.min(...d.map(date => new Date(date))));
        }

        window.save = async (reg, field, val, table) => { 
            await supabaseClient.from(table).update({ [field]: val }).eq('registration_number', reg); 
            loadFleet(); 
        };

        window.toggleVOR_Action = async (reg, state, table) => { 
            let reason = null;
            if (!state) { 
                reason = prompt(`Please enter the reason for placing ${reg} VOR:`);
                if (reason === null) return; 
            }

            await supabaseClient.from(table).update({ 
                is_vor: !state,
                vor_reason: reason 
            }).eq('registration_number', reg); 
            
            loadFleet(); 
        };

        window.addNewUnit = async () => { 
            const t = currentTab === 'trailer' ? 'trailers' : 'vehicles'; 
            const r = prompt("Enter New Registration:").toUpperCase().trim(); 
            if(r) { 
                await supabaseClient.from(t).upsert({ registration_number: r }); 
                loadFleet(); 
            } 
        };

        window.removeUnit = async (reg, table) => { 
            if(confirm(`Remove ${reg} permanently?`)) { 
                await supabaseClient.from(table).delete().eq('registration_number', reg); 
                loadFleet(); 
            } 
        };

        // --- PULL WEEK REPORT LOGIC ---
        window.pullWeekReport = () => {
            const weekStr = prompt("Enter the ISO Week number you want to pull a report for:");
            if (!weekStr) return;
            const targetWeek = parseInt(weekStr.trim());
            if (isNaN(targetWeek) || targetWeek < 1 || targetWeek > 53) {
                alert("Please enter a valid week number between 1 and 53.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l');

            doc.setFontSize(16);
            doc.text(`FTS MAINTENANCE - WEEK ${targetWeek} SCHEDULED TASKS`, 14, 15);

            let finalY = 25;

            const matchesRecurringWeek = (dStr, intervalWeeks) => {
                if (!dStr) return false;
                const baseDate = new Date(dStr);
                if(isNaN(baseDate)) return false;

                if (intervalWeeks === 0) {
                    return getWeekNumber(baseDate) === targetWeek;
                }

                let currentD = new Date(baseDate);
                const limitDate = new Date();
                limitDate.setDate(limitDate.getDate() - (12 * 7)); 

                while (currentD < limitDate) {
                    currentD.setDate(currentD.getDate() + (intervalWeeks * 7));
                }

                for(let i = 0; i < 10; i++) {
                    const futureD = new Date(currentD);
                    futureD.setDate(futureD.getDate() + (i * intervalWeeks * 7));
                    if (getWeekNumber(futureD) === targetWeek) return true;
                }
                return false;
            };

            const matchesWeek = (v) => {
                if (matchesRecurringWeek(v.mot_due, 0)) return true;
                if (matchesRecurringWeek(v.road_tax_due, 0)) return true;
                if (matchesRecurringWeek(v.tachograph_service_due, 0)) return true;
                if (matchesRecurringWeek(v.loler_due, 0)) return true;
                if (matchesRecurringWeek(v.pmi_due, 6)) return true;
                if (matchesRecurringWeek(v.brake_test, 6)) return true;
                return false;
            };

            const matchingVehicles = cachedVehicles.filter(matchesWeek);
            const matchingTrailers = cachedTrailers.filter(matchesWeek);

            if (matchingVehicles.length === 0 && matchingTrailers.length === 0) {
                alert(`No vehicles or trailers have tasks scheduled for Week ${targetWeek}.`);
                return;
            }

            if (matchingVehicles.length > 0) {
                matchingVehicles.sort((a, b) => a.registration_number.localeCompare(b.registration_number));
                doc.setFontSize(12);
                doc.text("VEHICLES", 14, finalY);
                doc.autoTable({
                    startY: finalY + 5,
                    head: [['Registration', 'Tasks Due', 'Status']],
                    body: matchingVehicles.map(v => {
                        let tasks = [];
                        if (matchesRecurringWeek(v.mot_due, 0)) tasks.push('MOT');
                        if (matchesRecurringWeek(v.pmi_due, 6)) tasks.push('PMI');
                        if (matchesRecurringWeek(v.road_tax_due, 0)) tasks.push('Road Tax');
                        if (matchesRecurringWeek(v.brake_test, 6)) tasks.push('Brake Test');
                        if (matchesRecurringWeek(v.tachograph_service_due, 0)) tasks.push('Tacho');
                        if (matchesRecurringWeek(v.loler_due, 0)) tasks.push('LOLER');
                        
                        return [
                            v.registration_number,
                            tasks.join(', '),
                            v.is_vor ? 'VOR' : 'Active'
                        ];
                    }),
                    headStyles: { fillColor: [225, 29, 72] }
                });
                finalY = doc.lastAutoTable.finalY + 15;
            }

            if (matchingTrailers.length > 0) {
                matchingTrailers.sort((a, b) => a.registration_number.localeCompare(b.registration_number));
                if (finalY > 180) { 
                    doc.addPage();
                    finalY = 20;
                }
                doc.setFontSize(12);
                doc.text("TRAILERS", 14, finalY);
                doc.autoTable({
                    startY: finalY + 5,
                    head: [['Registration', 'Tasks Due', 'Status']],
                    body: matchingTrailers.map(v => {
                        let tasks = [];
                        if (matchesRecurringWeek(v.mot_due, 0)) tasks.push('MOT');
                        if (matchesRecurringWeek(v.pmi_due, 6)) tasks.push('PMI');
                        if (matchesRecurringWeek(v.brake_test, 6)) tasks.push('Brake Test');
                        if (matchesRecurringWeek(v.loler_due, 0)) tasks.push('LOLER');
                        
                        return [
                            v.registration_number,
                            tasks.join(', '),
                            v.is_vor ? 'VOR' : 'Active'
                        ];
                    }),
                    headStyles: { fillColor: [225, 29, 72] }
                });
            }

            addFooterToPDF(doc);
            doc.save(`FTS_Week_${targetWeek}_Report.pdf`);
        };
        
        window.generatePDF = (reg) => {
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF();
            
            const vReg = reg.replace(/\s+/g, '').toUpperCase();
            const isTrailer = cachedTrailers.some(t => t.registration_number === reg);
            
            // Allow generating a PDF even if the unit is a Forklift not yet saved in Supabase
            let vData = isTrailer ? cachedTrailers.find(t => t.registration_number === reg) : cachedVehicles.find(v => v.registration_number === reg);
            if (!vData) vData = { registration_number: reg, mot_due: null, pmi_due: null, road_tax_due: null, brake_test: null, tachograph_service_due: null, loler_due: null, is_vor: false };
            
            const checks = cachedChecks.filter(c => (c.registration || c.trailer_number || '').replace(/\s+/g, '').toUpperCase() === vReg);
            const requiresLoler = isTrailer ? lolerTrailers.includes(vReg) : lolerVehicles.includes(vReg);

            doc.setFontSize(22); 
            doc.text("FTSMaintenance Audit Report", 14, 20);
            
            let bodyData = [];
            if (!isTrailer) {
                bodyData = [
                    ['MOT', vData.mot_due ? new Date(vData.mot_due).toLocaleDateString('en-GB') : 'N/A'],
                    ['PMI', vData.pmi_due ? `Week ${getWeekNumber(vData.pmi_due)}` : 'N/A'],
                    ['Road Tax', vData.road_tax_due ? new Date(vData.road_tax_due).toLocaleDateString('en-GB') : 'N/A'],
                    ['Brake Test', vData.brake_test ? `Week ${getWeekNumber(vData.brake_test)}` : 'N/A'],
                    ['Tacho Cal', vData.tachograph_service_due ? new Date(vData.tachograph_service_due).toLocaleDateString('en-GB') : 'N/A']
                ];
                if (requiresLoler) bodyData.push(['LOLER', vData.loler_due ? new Date(vData.loler_due).toLocaleDateString('en-GB') : 'N/A']);
                bodyData.push(['Status', vData.is_vor ? 'VOR' : 'Active']);
            } else {
                bodyData = [
                    ['MOT', vData.mot_due ? new Date(vData.mot_due).toLocaleDateString('en-GB') : 'N/A'],
                    ['PMI', vData.pmi_due ? `Week ${getWeekNumber(vData.pmi_due)}` : 'N/A'],
                    ['Brake Test', vData.brake_test ? `Week ${getWeekNumber(vData.brake_test)}` : 'N/A']
                ];
                if (requiresLoler) bodyData.push(['LOLER', vData.loler_due ? new Date(vData.loler_due).toLocaleDateString('en-GB') : 'N/A']);
                bodyData.push(['Status', vData.is_vor ? 'VOR' : 'Active']);
            }
            
            doc.autoTable({ 
                startY: 30, 
                head: [['Maintenance Field', 'Current Due / Week']], 
                body: bodyData,
                headStyles: { fillColor: [225, 29, 72] }
            });
            doc.autoTable({ 
                startY: doc.lastAutoTable.finalY + 10, 
                head: [['Date', 'Condition', 'Notes']], 
                body: checks.map(r => [new Date(r.created_at).toLocaleDateString('en-GB'), r.condition_status, r.defect_details || 'N/A']) 
            });
            
            addFooterToPDF(doc);
            doc.save(`${reg}_FTS_Report.pdf`);
        };

        window.generateFullFleetPDF = () => {
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF('l');
            let data = currentTab === 'trailer' ? [...cachedTrailers] : [...cachedVehicles];
            
            // Sort Alphabetically
            data.sort((a, b) => a.registration_number.localeCompare(b.registration_number));

            doc.text(`${currentTab.toUpperCase()} FLEET COMPLIANCE SUMMARY`, 14, 15);
            
            if (currentTab === 'trailer') {
                doc.autoTable({ 
                    startY: 25, 
                    head: [['Registration', 'MOT Due', 'PMI Week', 'Brake Test Week', 'Status']], 
                    body: data.map(v => [
                        v.registration_number, 
                        v.mot_due ? new Date(v.mot_due).toLocaleDateString('en-GB') : 'N/A', 
                        v.pmi_due ? `Week ${getWeekNumber(v.pmi_due)}` : 'N/A', 
                        v.brake_test ? `Week ${getWeekNumber(v.brake_test)}` : 'N/A',
                        v.is_vor ? 'VOR' : 'Active'
                    ]),
                    headStyles: { fillColor: [225, 29, 72] }
                });
            } else {
                doc.autoTable({ 
                    startY: 25, 
                    head: [['Registration', 'MOT Due', 'PMI Week', 'Road Tax', 'Brake Test Week', 'Status']], 
                    body: data.map(v => [
                        v.registration_number, 
                        v.mot_due ? new Date(v.mot_due).toLocaleDateString('en-GB') : 'N/A', 
                        v.pmi_due ? `Week ${getWeekNumber(v.pmi_due)}` : 'N/A', 
                        v.road_tax_due ? new Date(v.road_tax_due).toLocaleDateString('en-GB') : 'N/A',
                        v.brake_test ? `Week ${getWeekNumber(v.brake_test)}` : 'N/A',
                        v.is_vor ? 'VOR' : 'Active'
                    ]),
                    headStyles: { fillColor: [225, 29, 72] }
                });
            }
            
            addFooterToPDF(doc);
            doc.save(`FTS_Fleet_Report.pdf`);
        };

        // --- SMART PARSER ---
        function parseAuthFileName(fileName) {
            if (fileName.includes('---')) {
                const parts = fileName.split('---');
                if (parts.length >= 4) {
                    let compType = 'week';
                    if (parts[2] === 'mot_due' || parts[2] === 'tachograph_service_due' || parts[2] === 'road_tax_due' || parts[2] === 'loler_due') compType = 'date';
                    
                    return { 
                        reg: parts[0].replace(/\s+/g, '').toUpperCase(), 
                        table: parts[1].toLowerCase().trim(), 
                        folderName: parts[2],
                        dbColumn: parts[2],
                        actualName: parts.slice(3).join('---'), 
                        isCompliance: (parts[2] === 'pmi_due' || parts[2] === 'brake_test' || parts[2] === 'mot_due' || parts[2] === 'tachograph_service_due' || parts[2] === 'road_tax_due' || parts[2] === 'loler_due'), 
                        complianceType: compType
                    };
                }
            }
            
            if (fileName.includes('_')) {
                const parts = fileName.split('_');
                if (parts.length >= 3) {
                    const rawFolder = parts[2].trim();
                    let dbColumn = rawFolder;
                    let isCompliance = false;
                    let compType = 'week';

                    if (rawFolder.toLowerCase() === 'safetyinspection' || rawFolder.toLowerCase() === 'pmidue' || rawFolder.toLowerCase() === 'pmi') {
                        dbColumn = 'pmi_due';
                        isCompliance = true;
                    } else if (rawFolder.toLowerCase() === 'braketest') {
                        dbColumn = 'brake_test';
                        isCompliance = true;
                    } else if (rawFolder.toLowerCase() === 'motcertificate' || rawFolder.toLowerCase() === 'motdue' || rawFolder.toLowerCase() === 'mot') {
                        dbColumn = 'mot_due';
                        isCompliance = true;
                        compType = 'date';
                    } else if (rawFolder.toLowerCase() === 'tachographcalibration' || rawFolder.toLowerCase() === 'tachocalibration' || rawFolder.toLowerCase() === 'tachograph_service_due') {
                        dbColumn = 'tachograph_service_due';
                        isCompliance = true;
                        compType = 'date';
                    } else if (rawFolder.toLowerCase() === 'roadtax' || rawFolder.toLowerCase() === 'tax' || rawFolder.toLowerCase() === 'road_tax_due') {
                        dbColumn = 'road_tax_due';
                        isCompliance = true;
                        compType = 'date';
                    } else if (rawFolder.toLowerCase() === 'loler' || rawFolder.toLowerCase() === 'lolercertificate' || rawFolder.toLowerCase() === 'loler_due') {
                        dbColumn = 'loler_due';
                        isCompliance = true;
                        compType = 'date';
                    }

                    return { 
                        reg: parts[1].replace(/\s+/g, '').toUpperCase(), 
                        table: parts[0].toLowerCase().trim(), 
                        folderName: rawFolder, 
                        dbColumn: dbColumn, 
                        actualName: fileName, 
                        isCompliance: isCompliance,
                        complianceType: compType 
                    };
                }
            }
            return null; 
        }

        // --- AUTHORISATION ACTIONS ---
        window.authoriseFile = async (filePath) => {
            const cleanFilePath = filePath.replace(/\/+/g, '/').replace(/^\//, '');
            const fileName = cleanFilePath.split('/').pop();
            const fileData = parseAuthFileName(fileName);
            
            if(!fileData) return alert("Invalid file format. Cannot determine which vehicle this belongs to.");

            const { reg, table, folderName, dbColumn, actualName, isCompliance, complianceType } = fileData;
            
            let actualDbReg = reg;
            const allUnits = [...cachedVehicles, ...cachedTrailers];
            const matchedUnit = allUnits.find(u => (u.registration_number || '').replace(/\s+/g, '').toUpperCase() === reg);
            if (matchedUnit) {
                actualDbReg = matchedUnit.registration_number;
            }

            const categoryFolder = table.charAt(0).toUpperCase() + table.slice(1);
            const cleanNewPath = `${categoryFolder}/${reg}/${folderName}/${actualName}`.replace(/\/+/g, '/').replace(/^\//, '');

            try {
                const { error: moveErr } = await supabaseClient.storage.from('maintenance_docs').move(cleanFilePath, cleanNewPath);
                if (moveErr) throw new Error(`Move failed: ${moveErr.message}`);

                if (isCompliance) {
                    let updateDateStr = '';

                    if (complianceType === 'date') {
                        let nextDatePrompt = prompt(`What is the NEXT due date for this ${folderName}?\n(Format: DD/MM/YYYY or YYYY-MM-DD)`);
                        
                        if (!nextDatePrompt) {
                            await supabaseClient.storage.from('maintenance_docs').move(cleanNewPath, cleanFilePath);
                            return alert("Authorisation cancelled. A valid future date is required for compliance tracking.");
                        }

                        let parsedDate;
                        const partsUK = nextDatePrompt.split(/[\/\-]/);
                        if (partsUK.length === 3 && partsUK[0].length <= 2) { 
                            parsedDate = new Date(`${partsUK[2]}-${partsUK[1]}-${partsUK[0]}T12:00:00Z`);
                        } else {
                            parsedDate = new Date(nextDatePrompt);
                        }

                        // --- FAT FINGER SAFEGUARDS ---
                        if (isNaN(parsedDate.getTime())) {
                            await supabaseClient.storage.from('maintenance_docs').move(cleanNewPath, cleanFilePath);
                            return alert("Authorisation cancelled. The date format was not recognised.");
                        }
                        
                        const today = new Date();
                        today.setHours(0,0,0,0);
                        const maxFuture = new Date();
                        maxFuture.setFullYear(maxFuture.getFullYear() + 2); // Max 2 years in the future
                        
                        if (parsedDate < today) {
                            await supabaseClient.storage.from('maintenance_docs').move(cleanNewPath, cleanFilePath);
                            return alert("SAFETY LOCK: Authorisation cancelled. You cannot enter a compliance expiration date in the past.");
                        }
                        if (parsedDate > maxFuture) {
                            await supabaseClient.storage.from('maintenance_docs').move(cleanNewPath, cleanFilePath);
                            return alert("SAFETY LOCK: Authorisation cancelled. Date exceeds 2 years in the future. Please double-check the year entered.");
                        }
                        // ------------------------------

                        updateDateStr = parsedDate.toISOString().split('T')[0];

                    } else {
                        let testWeekStr = prompt(`What ISO week number was this ${folderName} carried out? (e.g., 18)\n\nNote: Entering the exact week ensures accurate compliance tracking.`);
                        
                        if (!testWeekStr || isNaN(parseInt(testWeekStr))) {
                            await supabaseClient.storage.from('maintenance_docs').move(cleanNewPath, cleanFilePath);
                            return alert("Authorisation cancelled. A valid week number is required for compliance tracking.");
                        }

                        let testWeek = parseInt(testWeekStr);
                        let currentYr = new Date().getFullYear();
                        
                        // NEW FIX: Local time construction to avoid timezone shifts!
                        let baseDate = getDateFromISOWeek(testWeek, currentYr);
                        baseDate.setHours(12, 0, 0, 0); // Anchor to noon to prevent midnight DST bugs
                        baseDate.setDate(baseDate.getDate() + 42); 
                        
                        const yyyy = baseDate.getFullYear();
                        const mm = String(baseDate.getMonth() + 1).padStart(2, '0');
                        const dd = String(baseDate.getDate()).padStart(2, '0');
                        updateDateStr = `${yyyy}-${mm}-${dd}`;
                    }
                    
                    const { error: dbErr } = await supabaseClient.from(table)
                        .update({ [dbColumn]: updateDateStr })
                        .eq('registration_number', actualDbReg);
                    
                    if (dbErr) console.warn("Compliance Sync Issue:", dbErr.message);
                    
                    if (complianceType === 'date') {
                        alert(`Authorised! File moved to ${categoryFolder}/${reg}/${folderName}. Next due: ${new Date(updateDateStr).toLocaleDateString('en-GB')}.`);
                    } else {
                        alert(`Authorised! File moved to ${categoryFolder}/${reg}/${folderName} and 6-week compliance date updated.`);
                    }
                } else {
                    alert(`Authorised! File moved to ${categoryFolder}/${reg}/${folderName}. Linked database records updated.`);
                }

                await supabaseClient.from('maintenance_records')
                    .update({ file_path: cleanNewPath })
                    .eq('file_path', cleanFilePath);

                loadJCCFiles(); 
                loadFleet(); 
            } catch(err) {
                alert("Authorisation Error:\n" + err.message);
            }
        };

        window.rejectFile = async (filePath) => {
            const note = prompt("Please enter a reason for rejecting this document:");
            if (note === null) return;

            const cleanFilePath = filePath.replace(/\/+/g, '/').replace(/^\//, '');
            const fileName = cleanFilePath.split('/').pop();
            const cleanNewPath = `REJECTED/${fileName}`.replace(/\/+/g, '/').replace(/^\//, '');

            try {
                const { error: moveErr } = await supabaseClient.storage.from('maintenance_docs').move(cleanFilePath, cleanNewPath);
                if (moveErr) throw new Error(moveErr.message);

                const updates = { file_path: cleanNewPath, document_type: 'REJECTED' };
                if (note.trim() !== "") updates.notes = note;

                await supabaseClient.from('maintenance_records').update(updates).eq('file_path', cleanFilePath);

                alert("File moved to Rejected folder.");
                loadJCCFiles();
            } catch(err) {
                alert("Rejection Error: " + err.message);
            }
        };

        window.addFileNote = async (filePath) => {
            const note = prompt("Enter a note for this document (this will be attached digitally):");
            if (!note || note.trim() === "") return;

            const cleanFilePath = filePath.replace(/\/+/g, '/').replace(/^\//, '');
            const fileName = cleanFilePath.split('/').pop();

            try {
                const { data: existing, error: fetchErr } = await supabaseClient
                    .from('maintenance_records')
                    .select('id')
                    .eq('file_path', cleanFilePath)
                    .maybeSingle();
                
                if (fetchErr) throw fetchErr;

                if (existing) {
                    const { error: updateErr } = await supabaseClient
                        .from('maintenance_records')
                        .update({ notes: note })
                        .eq('file_path', cleanFilePath);
                    
                    if (updateErr) throw updateErr;
                } else {
                    const fileData = parseAuthFileName(fileName);
                    let regToInsert = "UNKNOWN";
                    let docTypeToInsert = "MANUAL_UPLOAD";

                    if (fileData) {
                        regToInsert = fileData.reg;
                        docTypeToInsert = fileData.folderName || fileData.dbColumn || "MANUAL_UPLOAD";
                    } else {
                        const pathParts = cleanFilePath.split('/');
                        if (pathParts.length >= 3) {
                            regToInsert = pathParts[1].toUpperCase();
                            docTypeToInsert = pathParts[2];
                        }
                    }

                    const { error: insertErr } = await supabaseClient
                        .from('maintenance_records')
                        .insert([{ 
                            file_path: cleanFilePath, 
                            notes: note,
                            vehicle_reg: regToInsert,
                            document_type: docTypeToInsert
                        }]);
                    
                    if (insertErr) throw insertErr;
                }
                
                alert("Note saved successfully.");
                loadJCCFiles();
            } catch(err) {
                alert("Note Error: " + err.message + "\n\n(Ensure you ran the SQL script to allow updates to maintenance_records!)");
            }
        };

        window.deleteFile = async (filePath) => {
            if (!confirm("WARNING: Are you sure you want to permanently delete this document? This cannot be undone.")) return;

            const cleanFilePath = filePath.replace(/\/+/g, '/').replace(/^\//, '');

            try {
                const { error: storageErr } = await supabaseClient.storage.from('maintenance_docs').remove([cleanFilePath]);
                if (storageErr) throw new Error(`Storage Deletion Failed: ${storageErr.message}`);

                const { error: dbErr } = await supabaseClient.from('maintenance_records')
                    .delete()
                    .eq('file_path', cleanFilePath);
                
                if (dbErr) console.warn("Database Deletion Warning:", dbErr.message);

                alert("File permanently deleted.");
                loadJCCFiles();
            } catch(err) {
                alert("Delete Error:\n" + err.message + "\n\n(Check your Supabase SQL policies for DELETE permissions!)");
            }
        };

        // --- FROST DOCS RENDERER ---
        async function loadJCCFiles() {
            const grid = document.getElementById('fleet-grid'); 
            const backBtn = document.getElementById('jcc-back');
            grid.innerHTML = '<p class="text-slate-500 italic">Accessing Frost Docs...</p>';
            
            updateBreadcrumbs();
            backBtn.classList.toggle('hidden', currentPath.length === 0);

            const folderPath = currentPath.join('/');
            const { data, error } = await supabaseClient.storage.from('maintenance_docs').list(folderPath, { limit: 100 });
            
            if (error) {
                grid.innerHTML = `<p class="text-rose-500">Error loading files: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                grid.innerHTML = '<p class="text-slate-500 italic">This directory is empty.</p>';
                return;
            }

            let fileNotesMap = {};
            const filesOnly = data.filter(item => item.id).map(item => folderPath ? `${folderPath}/${item.name}` : item.name);
            
            if (filesOnly.length > 0) {
                const { data: dbRecords } = await supabaseClient.from('maintenance_records').select('file_path, notes').in('file_path', filesOnly);
                if (dbRecords) {
                    dbRecords.forEach(rec => {
                        if (rec.notes) fileNotesMap[rec.file_path] = rec.notes;
                    });
                }
            }

            grid.innerHTML = data.filter(item => item.name !== '.emptyFolderPlaceholder').map(item => {
                const isFolder = !item.id;
                let dateDisplay = '';
                if (item.created_at) {
                    const dateObj = new Date(item.created_at);
                    const ukDate = dateObj.toLocaleDateString('en-GB');
                    const ukTime = dateObj.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    dateDisplay = `<p class="text-xs font-black text-slate-500 mt-0.5 uppercase">Added: ${ukDate} - ${ukTime}</p>`;
                }

                if (isFolder) {
                    return `
                        <div class="glass-card folder-card p-6 flex flex-col items-center gap-3" onclick="navigateDown('${item.name}')">
                            <span class="font-black text-lg uppercase">${item.name}</span>
                            <span class="text-[9px] font-bold text-slate-500 uppercase text-center">Open Folder</span>
                        </div>`;
                } else {
                    const fullFilePath = folderPath ? `${folderPath}/${item.name}` : item.name;
                    const { data: url } = supabaseClient.storage.from('maintenance_docs').getPublicUrl(fullFilePath);
                    
                    const parsedData = parseAuthFileName(item.name);
                    let displayName = parsedData ? parsedData.actualName : item.name;

                    const existingNote = fileNotesMap[fullFilePath];
                    const noteHtml = existingNote ? `<div class="mt-3 p-2 bg-amber-500/10 border border-amber-500/30 rounded text-amber-500 text-[10px] font-bold italic leading-tight"><b>Note:</b> ${existingNote}</div>` : '';

                    let actionButtons = `
                        <div class="flex gap-1 mt-4">
                            <button onclick="openLightbox('${url.publicUrl}')" class="flex-[2] bg-rose-600 hover:bg-rose-500 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors flex items-center justify-center">View</button>
                            <button onclick="addFileNote('${fullFilePath}')" class="flex-[1.5] bg-amber-500 hover:bg-amber-400 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">${existingNote ? 'Edit Note' : 'Add Note'}</button>
                            <button onclick="deleteFile('${fullFilePath}')" class="flex-1 bg-slate-800 hover:bg-red-700 text-slate-300 hover:text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">Del</button>
                        </div>
                    `;

                    if (folderPath.toUpperCase().includes('AUTHORIS')) {
                        actionButtons = `
                            <div class="flex gap-1 mt-4">
                                <button onclick="openLightbox('${url.publicUrl}')" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors flex items-center justify-center">View</button>
                                <button onclick="authoriseFile('${fullFilePath}')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">Auth</button>
                                <button onclick="rejectFile('${fullFilePath}')" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">Reject</button>
                                <button onclick="addFileNote('${fullFilePath}')" class="flex-1 bg-amber-500 hover:bg-amber-400 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">Note</button>
                                <button onclick="deleteFile('${fullFilePath}')" class="flex-1 bg-slate-800 hover:bg-red-700 text-slate-300 hover:text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">Del</button>
                            </div>
                        `;
                    }

                    return `
                        <div class="glass-card p-4 flex flex-col justify-between border-l-4 border-l-rose-600" data-search="${displayName}">
                            <div>
                                <h3 class="font-black text-xs uppercase break-all">${displayName}</h3>
                                ${dateDisplay}
                                ${noteHtml}
                            </div>
                            ${actionButtons}
                        </div>`;
                }
            }).join('');
            
            // Trigger search filter just in case
            const searchQuery = document.getElementById('jcc-search').value;
            if (searchQuery) filterGrid(searchQuery);
        }

        function navigateDown(folderName) {
            currentPath.push(folderName);
            loadJCCFiles();
        }

        function navigateUp() {
            if (currentPath.length > 0) {
                currentPath.pop();
                loadJCCFiles();
            }
        }

        function navigateToPathIndex(index) {
            currentPath = currentPath.slice(0, index + 1);
            loadJCCFiles();
        }

        function resetToRoot() {
            currentPath = [];
            loadJCCFiles();
        }

        function updateBreadcrumbs() {
            const container = document.getElementById('breadcrumb-container');
            let html = `<span class="breadcrumb-item" onclick="resetToRoot()">Frost Docs</span>`;
            currentPath.forEach((folder, index) => {
                html += ` <span class="text-slate-600">/</span> <span class="breadcrumb-item" onclick="navigateToPathIndex(${index})">${folder}</span>`;
            });
            container.innerHTML = html;
        }

        function getHealthStatus(v) {
            const pmiWk = getWeekNumber(v.pmi_due);
            if (pmiWk && pmiWk <= currentWeek) return 'plate-critical';
            if (!v.mot_due) return 'plate-ok';
            const motDiff = (new Date(v.mot_due) - new Date()) / 86400000;
            if (motDiff < 7) return 'plate-critical';
            if (motDiff < 14) return 'plate-warn';
            return 'plate-ok';
        }

        window.onload = () => { 
            document.getElementById('current-week-badge').innerText = `WEEK ${currentWeek}`;
            checkSession(); 
            
            const lastTab = localStorage.getItem('fts_current_tab');
            if (lastTab) switchTab(lastTab); 
        };
    </script>
