<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTSMaintenance | Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --fleet-red: #e11d48; --fleet-amber: #f59e0b; --fleet-green: #10b981; --bg-main: #0f172a; --sidebar-bg: #1e293b; --card-bg: #1e293b; --text-main: #f1f5f9; --border-color: #334155; }
        .light { --bg-main: #f8fafc; --sidebar-bg: #ffffff; --card-bg: #ffffff; --text-main: #0f172a; --border-color: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); transition: all 0.3s ease; display: flex; height: 100vh; overflow: hidden; font-size: 16px; }
        
        /* Login Screen Styles */
        #login-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .login-box { width: 100%; max-width: 400px; padding: 2.5rem; background: #1e293b; border-radius: 1.5rem; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        aside { width: 340px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 1.25rem; height: 100vh; flex-shrink: 0; }
        main { flex-grow: 1; height: 100vh; overflow-y: auto; padding: 1.5rem; }
        .nav-link { width: 100%; text-align: left; padding: 0.85rem 1.25rem; border-radius: 0.75rem; font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; color: #94a3b8; transition: all 0.2s; display: flex; align-items: center; gap: 0.75rem; }
        .nav-link.active { background: var(--fleet-red); color: white; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3); }
        .glass-card { background: var(--card-bg); border: 1px solid var(--border-color); box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.1); transition: all 0.2s ease; position: relative; overflow: hidden; padding: 1rem !important; }
        .plate-badge { font-weight: 800; padding: 4px 12px; border-radius: 6px; font-size: 0.95rem; display: inline-flex; color: #fff; }
        .plate-ok { background: var(--fleet-green); }
        .plate-warn { background: var(--fleet-amber); color: #000; }
        .plate-critical { background: var(--fleet-red); }
        .btn-action { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); transition: all 0.3s ease; position: relative; z-index: 20; }
        .btn-history { background: rgba(51, 65, 85, 0.5); color: #cbd5e1; }
        .btn-pdf { background: #0ea5e9; color: white; border-color: #0ea5e9; }
        .btn-compliance { background: var(--fleet-red); color: white; width: 100%; font-size: 10px; font-weight: 900; padding: 6px; border-radius: 4px; margin-top: 2px; text-transform: uppercase; border: none; cursor: pointer; }
        .label-heading { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; display: block; letter-spacing: 0.025em; }
        input[type="date"], .input-text, .login-input { background: rgba(0,0,0,0.1); border-radius: 4px; padding: 4px 6px; border: 1px solid var(--border-color); color: inherit; font-size: 0.9rem; font-weight: 600; width: 100%; outline: none; }
        .login-input { padding: 0.75rem 1rem; margin-bottom: 1rem; background: #0f172a; border-radius: 0.75rem; }
        .week-display { background: #334155; padding: 4px 6px; border-radius: 4px; font-size: 0.9rem; font-weight: 800; color: #fff; text-align: center; border: 1px solid #475569; width: 100%; margin-top: 2px; display: block; }
        .defect-active { background: var(--fleet-amber); color: #000; border-color: var(--fleet-amber); animation: pulse-border 2s infinite; cursor: pointer; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
        .vor-stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); border: 4px solid var(--fleet-red); color: var(--fleet-red); padding: 4px 18px; font-weight: 900; font-size: 1.5rem; opacity: 0; pointer-events: none; background: var(--card-bg); z-index: 10; }
        .card-vor .vor-stamp { opacity: 0.9; }
        .card-vor .content-fade { opacity: 0.3; filter: grayscale(1); }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
        #report-panel { background: rgba(0,0,0,0.1); border: 1px dashed var(--border-color); border-radius: 0.75rem; padding: 1rem; font-size: 0.85rem; margin-top: 0.75rem; max-height: 350px; overflow-y: auto; }
        .report-item { margin-bottom: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); }
        .sort-btn { background: #334155; color: #cbd5e1; border: 1px solid #475569; padding: 0.5rem; border-radius: 0.5rem; font-size: 11px; font-weight: 800; width: 100%; text-align: center; cursor: pointer; transition: 0.2s; }
        .sort-btn.active { background: #475569; color: white; border-color: #94a3b8; }
        .folder-card { cursor: pointer; border-left: 4px solid var(--fleet-red); }
        .breadcrumb-item { cursor: pointer; color: #94a3b8; transition: color 0.2s; }
        .breadcrumb-item:hover { color: #e11d48; }
        
        .defect-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .defect-table th { text-align: left; padding: 12px; background: rgba(225, 29, 72, 0.1); color: var(--fleet-red); font-weight: 800; text-transform: uppercase; font-size: 11px; border-bottom: 2px solid var(--border-color); }
        .defect-table td { padding: 12px; border-bottom: 1px solid var(--border-color); vertical-align: top; }
        .defect-row:hover { background: rgba(255,255,255,0.02); }

        .sub-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .sub-nav-btn { padding: 6px 16px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid var(--border-color); color: #94a3b8; transition: 0.2s; }
        .sub-nav-btn.active { background: var(--fleet-red); color: white; border-color: var(--fleet-red); }
    </style>
</head>
<body class="dark">

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 class="text-3xl font-black uppercase mb-2 text-center">FTS<span class="text-rose-600">Login</span></h2>
            <p class="text-slate-500 text-xs text-center font-bold uppercase mb-8 tracking-widest">Management Portal Access</p>
            
            <label class="label-heading">Email Address</label>
            <input type="email" id="login-email" class="login-input" placeholder="name@fts.com">
            
            <label class="label-heading">Password</label>
            <input type="password" id="login-password" class="login-input" placeholder="••••••••">
            
            <button id="login-btn" onclick="handleLogin()" class="w-full bg-rose-600 text-white py-4 rounded-xl font-black uppercase hover:bg-rose-500 transition-all shadow-lg shadow-rose-600/20 mt-4">Sign In</button>
            <p id="login-error" class="text-rose-500 text-[10px] font-bold text-center mt-4 hidden uppercase"></p>
        </div>
    </div>

    <aside id="main-sidebar" class="hidden">
        <div class="mb-6">
            <h1 class="text-2xl font-black uppercase mb-1">FTS<span class="text-rose-600">Maintenance</span></h1>
            <div class="flex items-center gap-2 flex-wrap">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-black">● Live Sync</p>
                <span id="current-week-badge" class="text-[10px] px-2 py-0.5 rounded bg-rose-600/20 text-rose-500 font-black border border-rose-600/30">WEEK --</span>
            </div>
        </div>
        
        <nav class="mb-4">
            <button id="nav-vehicle" onclick="switchTab('vehicle')" class="nav-link active">VEHICLES</button>
            <button id="nav-trailer" onclick="switchTab('trailer')" class="nav-link">TRAILERS</button>
            <button id="nav-jcc" onclick="switchTab('jcc')" class="nav-link">FROST CONNECT</button>
            <button id="nav-defects" onclick="switchTab('defects')" class="nav-link">DEFECTS</button>
        </nav>

        <div id="sidebar-controls">
            <div class="mb-6">
                <p class="text-[10px] text-slate-500 font-black uppercase mb-2">Sorting Preference</p>
                <div class="flex gap-2">
                    <button id="sort-alpha" onclick="setSort('alpha')" class="sort-btn active">A-Z</button>
                    <button id="sort-date" onclick="setSort('date')" class="sort-btn">DUE DATE</button>
                </div>
            </div>
        </div>

        <div class="flex-grow">
            <button onclick="toggleMode()" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 transition text-sm font-bold text-slate-400 mb-2">◐ Toggle Day/Night</button>
            <div class="mt-2">
                <span class="text-[11px] font-black text-slate-500 uppercase tracking-widest">Audit Trail</span>
                <div id="report-panel"><p class="text-slate-500 italic">Select card for details.</p></div>
            </div>
        </div>

        <div class="pt-4 border-t border-slate-700">
            <div class="bg-slate-800/40 p-3 rounded-lg mb-3 flex justify-between items-center">
                <span id="stat-label" class="text-[11px] text-slate-500 font-bold uppercase">Total Units</span>
                <span id="stat-total" class="text-xl font-black">--</span>
            </div>
            <button id="btn-fleet-report" onclick="generateFullFleetPDF()" class="w-full bg-slate-700 text-white py-3 rounded-xl text-[11px] font-black hover:bg-slate-600 transition-all uppercase mb-2">Generate Fleet Report</button>
            <button id="add-unit-btn" onclick="window.addNewUnit()" class="w-full bg-rose-600 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-rose-500 transition-all uppercase mb-2">+ Add Unit</button>
            <button onclick="handleLogout()" class="w-full text-slate-500 py-2 text-[10px] font-black uppercase hover:text-rose-500 transition-colors">Sign Out</button>
        </div>
    </aside>

    <main id="main-content" class="hidden">
        <div id="jcc-header" class="hidden mb-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button id="jcc-back" onclick="navigateUp()" class="hidden bg-slate-800 text-slate-300 px-4 py-2 rounded-lg font-bold text-xs uppercase hover:bg-slate-700">← Back</button>
                <div id="breadcrumb-container" class="flex items-center gap-2 text-sm font-black uppercase text-slate-400">
                    <span>Frost Docs</span>
                </div>
            </div>
            <input type="text" id="jcc-search" oninput="filterJCC(this.value)" placeholder="Search files..." class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-lg text-sm text-white outline-none focus:border-rose-600">
        </div>
        <div id="fleet-grid" class="grid-layout"></div>
    </main>

    <input type="file" id="compliance-upload-hidden" class="hidden" accept=".pdf,.jpg,.jpeg,.png">

    <script>
        const SB_URL = 'https://mbudwnwxucluwgbkgbfx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q';
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentTab = 'vehicle';
        let defectView = 'active'; 
        let sortMode = 'alpha';
        let cachedChecks = [];
        let cachedVehicles = [];
        let cachedTrailers = [];
        let activeUploadData = null;
        let currentPath = []; 

        // --- AUTH LOGIC ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            loginBtn.innerText = "AUTHENTICATING...";
            errorEl.classList.add('hidden');

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.innerText = error.message;
                errorEl.classList.remove('hidden');
                loginBtn.innerText = "SIGN IN";
            } else {
                showApp();
            }
        }

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showApp();
        }

        function showApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            loadFleet();
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        function toggleMode() { 
            document.documentElement.classList.toggle('light'); 
            document.documentElement.classList.toggle('dark'); 
        }
        
        function getWeekNumber(dateInput) {
            if (!dateInput) return null;
            const d = new Date(dateInput);
            if (isNaN(d)) return null;
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(), 0, 1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        const currentWeek = getWeekNumber(new Date());

        function switchTab(tab) { 
            currentTab = tab; 
            localStorage.setItem('fts_current_tab', tab);
            
            const tabs = ['vehicle', 'trailer', 'jcc', 'defects'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if(btn) btn.classList.toggle('active', tab === t);
            });

            const addBtn = document.getElementById('add-unit-btn');
            const reportBtn = document.getElementById('btn-fleet-report');
            const controls = document.getElementById('sidebar-controls');
            const jccHeader = document.getElementById('jcc-header');
            const statLabel = document.getElementById('stat-label');

            if(tab === 'jcc') {
                if(addBtn) addBtn.style.display = 'none'; 
                if(reportBtn) reportBtn.style.display = 'none'; 
                if(controls) controls.style.display = 'none';
                jccHeader.classList.remove('hidden'); 
                statLabel.innerText = "FOLDERS"; 
                currentPath = [];
                loadJCCFiles();
            } else {
                if(addBtn) addBtn.style.display = (tab === 'defects') ? 'none' : 'block';
                if(reportBtn) reportBtn.style.display = (tab === 'defects') ? 'none' : 'block';
                if(controls) controls.style.display = (tab === 'defects') ? 'none' : 'block'; 
                jccHeader.classList.add('hidden');
                statLabel.innerText = (tab === 'defects') ? "DEFECTS FOUND" : "TOTAL UNITS";
                loadFleet(); 
            }
        }

        function setSort(mode) { 
            sortMode = mode; 
            document.getElementById('sort-alpha').classList.toggle('active', mode === 'alpha'); 
            document.getElementById('sort-date').classList.toggle('active', mode === 'date'); 
            renderFleet(); 
        }

        async function loadFleet() {
            try {
                const [vResponse, tResponse, cResponse, tcResponse] = await Promise.all([
                    supabaseClient.from('vehicles').select('*'),
                    supabaseClient.from('trailers').select('*'),
                    supabaseClient.from('daily_vehicle_checks').select('*').order('created_at', { ascending: false }),
                    supabaseClient.from('daily_trailer_checks').select('*').order('created_at', { ascending: false })
                ]);
                cachedVehicles = vResponse.data || [];
                cachedTrailers = tResponse.data || [];
                
                const vChecks = (cResponse.data || []).map(item => ({ ...item, _origin: 'daily_vehicle_checks' }));
                const tChecks = (tcResponse.data || []).map(item => ({ ...item, _origin: 'daily_trailer_checks' }));
                cachedChecks = [...vChecks, ...tChecks].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                renderFleet();
            } catch (err) { console.error("Load Error:", err); }
        }

        function setDefectView(view) {
            defectView = view;
            renderFleet();
        }

        async function resolveDefect(id, currentNotes, originTable) {
            const who = prompt("Enter your name:");
            if (!who) return;
            const action = prompt("What action was taken?");
            if (!action) return;
            
            const timestamp = new Date().toLocaleString('en-GB');
            const newNotes = `${currentNotes || ''}\n\n--- RESOLVED ---\nBy: ${who}\nDate: ${timestamp}\nAction: ${action}`;
            
            const { error } = await supabaseClient
                .from(originTable)
                .update({ 
                    condition_status: 'Resolved - Nil Defect',
                    defect_details: newNotes
                })
                .eq('id', id);

            if (error) alert("Error: " + error.message);
            else loadFleet();
        }

        function renderFleet() {
            const grid = document.getElementById('fleet-grid'); 
            grid.innerHTML = '';
            
            if (currentTab === 'jcc') return;

            // --- DEFECTS TAB LOGIC ---
            if (currentTab === 'defects') {
                let defectReports = [];
                
                if (defectView === 'active') {
                    defectReports = cachedChecks.filter(c => 
                        c.condition_status && 
                        c.condition_status.toLowerCase().includes('defect') && 
                        !c.condition_status.toLowerCase().includes('nil') &&
                        !c.condition_status.toLowerCase().includes('resolved')
                    );
                } else {
                    defectReports = cachedChecks.filter(c => 
                        c.condition_status && 
                        c.condition_status.toLowerCase().includes('resolved')
                    );
                }

                document.getElementById('stat-total').innerText = defectReports.length;

                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'col-span-full mb-2';
                sectionHeader.innerHTML = `
                    <div class="sub-nav">
                        <button onclick="setDefectView('active')" class="sub-nav-btn ${defectView === 'active' ? 'active' : ''}">Active Defects</button>
                        <button onclick="setDefectView('history')" class="sub-nav-btn ${defectView === 'history' ? 'active' : ''}">History</button>
                    </div>
                `;
                grid.appendChild(sectionHeader);

                if (defectReports.length === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.className = 'glass-card p-8 text-center text-slate-500 font-bold uppercase col-span-full';
                    emptyMsg.innerText = defectView === 'active' ? 'No Active Defects Reported' : 'No Resolved History Found';
                    grid.appendChild(emptyMsg);
                    return;
                }

                const tableContainer = document.createElement('div');
                tableContainer.className = 'glass-card col-span-full overflow-x-auto';
                
                let tableHTML = `
                    <table class="defect-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Unit ID</th>
                                <th>Driver Name</th>
                                <th>Details</th>
                                <th style="text-align:right">${defectView === 'active' ? 'Action' : 'Status'}</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                defectReports.forEach(report => {
                    const date = new Date(report.created_at).toLocaleDateString('en-GB');
                    const unitID = report.registration || report.trailer_number || 'N/A'; 
                    tableHTML += `
                        <tr class="defect-row">
                            <td class="font-black text-slate-400 whitespace-nowrap">${date}</td>
                            <td><span class="plate-badge plate-critical">${unitID}</span></td>
                            <td class="font-bold uppercase whitespace-nowrap">${report.driver_name || 'Unknown'}</td>
                            <td class="text-slate-300 italic text-xs" style="max-width:300px; white-space: pre-wrap;">${report.defect_details || 'No details'}</td>
                            <td style="text-align:right">
                                ${defectView === 'active' ? 
                                    `<button onclick="resolveDefect('${report.id}', \`${report.defect_details || ''}\`, '${report._origin}')" class="btn-action bg-green-600 text-white border-none">Mark Resolved</button>` : 
                                    `<span class="text-[9px] font-black text-green-500 uppercase">Resolved</span>`
                                }
                            </td>
                        </tr>
                    `;
                });

                tableHTML += `</tbody></table>`;
                tableContainer.innerHTML = tableHTML;
                grid.appendChild(tableContainer);
                return;
            }

            // --- STANDARD VEHICLE/TRAILER TAB LOGIC ---
            let data = [];
            if(currentTab === 'vehicle') data = [...cachedVehicles];
            else if(currentTab === 'trailer') data = [...cachedTrailers];

            document.getElementById('stat-total').innerText = data.length;

            if (sortMode === 'alpha') {
                data.sort((a, b) => a.registration_number.localeCompare(b.registration_number));
            } else {
                data.sort((a, b) => getMinDate(a) - getMinDate(b));
            }

            data.forEach(v => {
                const vReg = v.registration_number.replace(/\s+/g, '').toUpperCase();
                const latestCheck = cachedChecks.find(c => {
                    const checkID = (c.registration || c.trailer_number || '').replace(/\s+/g, '').toUpperCase();
                    return checkID === vReg;
                });
                let hasActiveDefect = latestCheck && latestCheck.condition_status.toLowerCase().includes('defect') && !latestCheck.condition_status.toLowerCase().includes('nil') && !latestCheck.condition_status.toLowerCase().includes('resolved');
                let isTrailer = cachedTrailers.some(t => t.registration_number === v.registration_number);
                let table = isTrailer ? 'trailers' : 'vehicles';
                
                const pmiWk = getWeekNumber(v.pmi_due);
                const brakeWk = getWeekNumber(v.brake_test);
                const isPmiDue = pmiWk !== null && pmiWk <= currentWeek;
                const isBrakeDue = brakeWk !== null && brakeWk <= currentWeek;

                const card = document.createElement('div');
                card.className = `glass-card rounded-xl ${v.is_vor ? 'card-vor' : ''}`;
                
                let vehicleSpecifics = !isTrailer ? `
                    <div class="grid grid-cols-2 gap-3">
                        <div><span class="label-heading">MOT Due</span><input type="date" value="${v.mot_due || ''}" onchange="window.save('${v.registration_number}', 'mot_due', this.value, 'vehicles')"></div>
                        <div>
                            <span class="label-heading">PMI Week</span>
                            ${isPmiDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'pmi_due', 'vehicles')" class="btn-compliance">Upload PMI</button>` : `<div class="week-display">WEEK ${pmiWk || '--'}</div>`}
                        </div>
                        <div><span class="label-heading">Road Tax</span><input type="date" value="${v.road_tax_due || ''}" onchange="window.save('${v.registration_number}', 'road_tax_due', this.value, 'vehicles')"></div>
                        <div>
                            <span class="label-heading">Brake Test Week</span>
                            ${isBrakeDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'brake_test', 'vehicles')" class="btn-compliance">Upload Brake</button>` : `<div class="week-display">WEEK ${brakeWk || '--'}</div>`}
                        </div>
                    </div>
                    <div class="mt-3 pt-3 border-t border-slate-700/50 flex justify-between items-end">
                        <div class="flex-1"><span class="label-heading">Tachograph Calibration</span><input type="date" class="max-w-[170px]" value="${v.tachograph_service_due || ''}" onchange="window.save('${v.registration_number}', 'tachograph_service_due', this.value, 'vehicles')"></div>
                ` : `
                    <div class="grid grid-cols-2 gap-3">
                        <div><span class="label-heading">MOT Due</span><input type="date" value="${v.mot_due || ''}" onchange="window.save('${v.registration_number}', 'mot_due', this.value, 'trailers')"></div>
                        <div>
                            <span class="label-heading">PMI Week</span>
                            ${isPmiDue ? `<button onclick="window.triggerUpload('${v.registration_number}', 'pmi_due', 'trailers')" class="btn-compliance">Upload PMI</button>` : `<div class="week-display">WEEK ${pmiWk || '--'}</div>`}
                        </div>
                    </div>
                    <div class="mt-3 pt-3 border-t border-slate-700/50 flex justify-between items-end"><div class="flex-grow"></div>
                `;

                card.innerHTML = `
                    <div class="vor-stamp">OFF ROAD</div>
                    <div class="flex justify-between items-center mb-3 relative z-30">
                        <div class="flex flex-wrap items-center gap-1.5">
                            <div class="plate-badge ${getHealthStatus(v)}">${v.registration_number}</div>
                            ${!isTrailer ? `<button onclick="generatePDF('${v.registration_number}')" class="btn-action btn-pdf">PDF</button>` : ''}
                            <button onclick="generateReport('${v.registration_number}', true)" class="btn-action btn-history">History</button>
                            <button onclick="generateReport('${v.registration_number}', false)" class="btn-action ${hasActiveDefect ? 'defect-active' : ''}">${hasActiveDefect ? 'Defect' : 'Clear'}</button>
                        </div>
                        <button onclick="toggleVOR_Action('${v.registration_number}', ${v.is_vor}, '${table}')" class="btn-action ${v.is_vor ? 'text-rose-500 font-black' : 'text-slate-500'}">${v.is_vor ? '● VOR' : '○ Active'}</button>
                    </div>
                    <div class="content-fade">
                        <div class="mb-3"><span class="label-heading">VIN Number</span><input type="text" class="input-text" value="${v.vin_number || ''}" onchange="window.save('${v.registration_number}', 'vin_number', this.value, '${table}')"></div>
                        ${vehicleSpecifics}
                        <button onclick="window.removeUnit('${v.registration_number}', '${table}')" class="text-slate-600 hover:text-rose-500 transition-colors mb-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div></div>`;
                grid.appendChild(card);
            });
        }

        window.triggerUpload = (reg, field, table) => {
            activeUploadData = { reg, field, table };
            document.getElementById('compliance-upload-hidden').click();
        };

        // --- CONSOLIDATED UPLOAD INTERCEPTOR ---
        document.getElementById('compliance-upload-hidden').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !activeUploadData) return;
            const { reg, field, table } = activeUploadData;
            const cleanReg = reg.replace(/\s+/g, '').toUpperCase();
            const fileName = `${field}_WK${currentWeek}_${Date.now()}.${file.name.split('.').pop()}`;
            
            // Re-routed to the EXACT same AUTHORISE folder the sister app uses
            const authorizeFileName = `${cleanReg}---${table}---${field}---${fileName}`;
            const path = `AUTHORISE/${authorizeFileName}`;
            
            try {
                const { error: upErr } = await supabaseClient.storage.from('maintenance_docs').upload(path, file);
                if (upErr) throw upErr;
                
                alert("File uploaded to Authorisation Queue.");
                loadFleet(); 
            } catch (err) { alert("Upload error: " + err.message); }
        };

        function getMinDate(v) {
            const d = [v.mot_due, v.pmi_due, v.road_tax_due, v.tachograph_service_due, v.brake_test].filter(Boolean);
            if (d.length === 0) return new Date('2099-01-01');
            return new Date(Math.min(...d.map(date => new Date(date))));
        }

        window.save = async (reg, field, val, table) => { 
            await supabaseClient.from(table).update({ [field]: val }).eq('registration_number', reg); 
            loadFleet(); 
        };

        window.toggleVOR_Action = async (reg, state, table) => { 
            await supabaseClient.from(table).update({ is_vor: !state }).eq('registration_number', reg); 
            loadFleet(); 
        };

        window.addNewUnit = async () => { 
            const t = currentTab === 'trailer' ? 'trailers' : 'vehicles'; 
            const r = prompt("Enter New Registration:").toUpperCase().trim(); 
            if(r) { 
                await supabaseClient.from(t).upsert({ registration_number: r }); 
                loadFleet(); 
            } 
        };

        window.removeUnit = async (reg, table) => { 
            if(confirm(`Remove ${reg} permanently?`)) { 
                await supabaseClient.from(table).delete().eq('registration_number', reg); 
                loadFleet(); 
            } 
        };
        
        window.generatePDF = (reg) => {
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF();
            const vData = cachedVehicles.find(v => v.registration_number === reg);
            const checks = cachedChecks.filter(c => (c.registration || c.trailer_number || '').replace(/\s+/g, '').toUpperCase() === reg.replace(/\s+/g, '').toUpperCase());
            doc.setFontSize(22); 
            doc.text("FTSMaintenance Audit Report", 14, 20);
            doc.autoTable({ 
                startY: 30, 
                head: [['Maintenance Field', 'Current Due / Week']], 
                body: [['MOT', vData.mot_due || 'N/A'], ['PMI', vData.pmi_due ? `Week ${getWeekNumber(vData.pmi_due)}` : 'N/A'], ['Road Tax', vData.road_tax_due || 'N/A'], ['Brake Test', vData.brake_test ? `Week ${getWeekNumber(vData.brake_test)}` : 'N/A'], ['Status', vData.is_vor ? 'VOR' : 'Active']],
                headStyles: { fillColor: [225, 29, 72] }
            });
            doc.autoTable({ 
                startY: doc.lastAutoTable.finalY + 10, 
                head: [['Date', 'Condition', 'Notes']], 
                body: checks.map(r => [new Date(r.created_at).toLocaleDateString(), r.condition_status, r.defect_details || 'N/A']) 
            });
            doc.save(`${reg}_FTS_Report.pdf`);
        };

        window.generateFullFleetPDF = () => {
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF('l');
            const data = currentTab === 'trailer' ? cachedTrailers : cachedVehicles;
            doc.text(`${currentTab.toUpperCase()} FLEET COMPLIANCE SUMMARY`, 14, 15);
            doc.autoTable({ 
                startY: 25, 
                head: [['Registration', 'MOT Due', 'PMI Week', 'Status']], 
                body: data.map(v => [v.registration_number, v.mot_due || 'N/A', v.pmi_due ? `Week ${getWeekNumber(v.pmi_due)}` : 'N/A', v.is_vor ? 'VOR' : 'Active']),
                headStyles: { fillColor: [225, 29, 72] }
            });
            doc.save(`FTS_Fleet_Report.pdf`);
        };

        window.generateReport = (reg, full) => {
            const reports = cachedChecks.filter(c => (c.registration || c.trailer_number || '').toUpperCase().replace(/\s+/g, '') === reg.toUpperCase().replace(/\s+/g, ''));
            const panel = document.getElementById('report-panel');
            panel.innerHTML = `<div class="font-bold text-rose-500 mb-2">${reg} Audit History</div>` + 
                reports.slice(0, full ? 20 : 3).map(r => `
                <div class="report-item">
                    <div class="flex justify-between font-bold text-[11px]">
                        <span>${new Date(r.created_at).toLocaleDateString()}</span>
                        <span class="text-rose-400">${r.condition_status}</span>
                    </div>
                    <p class="text-slate-400 text-[10px] italic leading-tight mt-1">${r.defect_details || 'No notes'}</p>
                </div>`).join('');
        };

        // --- SMART PARSER ---
        function parseAuthFileName(fileName) {
            if (fileName.includes('---')) {
                const parts = fileName.split('---');
                if (parts.length >= 4) {
                    return { 
                        reg: parts[0].replace(/\s+/g, '').toUpperCase(), 
                        table: parts[1].toLowerCase().trim(), 
                        field: parts[2], 
                        actualName: parts.slice(3).join('---'), 
                        isCompliance: true 
                    };
                }
            }
            
            if (fileName.includes('_')) {
                const parts = fileName.split('_');
                if (parts.length >= 3) {
                    return { 
                        reg: parts[1].replace(/\s+/g, '').toUpperCase(), 
                        table: parts[0].toLowerCase().trim(), 
                        field: parts[2].trim(), 
                        actualName: fileName, 
                        isCompliance: false 
                    };
                }
            }
            return null; 
        }

        // --- AUTHORISATION ACTIONS ---
        window.authoriseFile = async (filePath) => {
            const cleanFilePath = filePath.replace(/\/+/g, '/').replace(/^\//, '');
            const fileName = cleanFilePath.split('/').pop();
            const fileData = parseAuthFileName(fileName);
            
            if(!fileData) return alert("Invalid file format. Cannot determine which vehicle this belongs to.");

            const { reg, table, field, actualName, isCompliance } = fileData;
            
            // MODIFICATION: Build structured folder path -> Category / Reg / DocumentType / Filename
            // Capitalize table name (e.g., 'vehicles' becomes 'Vehicles')
            const categoryFolder = table.charAt(0).toUpperCase() + table.slice(1);
            
            // Build and clean the new nested path
            const cleanNewPath = `${categoryFolder}/${reg}/${field}/${actualName}`.replace(/\/+/g, '/').replace(/^\//, '');

            try {
                // 1. Move the file into the new structured folder
                const { error: moveErr } = await supabaseClient.storage.from('maintenance_docs').move(cleanFilePath, cleanNewPath);
                
                if (moveErr) throw new Error(`Move failed (${cleanFilePath} -> ${cleanNewPath}): ${moveErr.message}`);

                if (isCompliance) {
                    const nextDate = new Date();
                    nextDate.setDate(nextDate.getDate() + 42); 
                    const { error: dbErr } = await supabaseClient.from(table).update({ [field]: nextDate.toISOString().split('T')[0] }).eq('registration_number', reg);
                    if (dbErr) console.warn("Compliance Sync Issue:", dbErr.message);
                    alert(`Authorised! File moved to ${categoryFolder}/${reg}/${field} and compliance dates updated.`);
                } else {
                    // 2. Keep sister app database in sync with the new nested folder path
                    const { error: dbErr } = await supabaseClient.from('maintenance_records')
                        .update({ file_path: cleanNewPath })
                        .eq('file_path', cleanFilePath);
                    
                    if (dbErr) console.warn("Sister App Sync Issue:", dbErr.message);
                    alert(`Authorised! File moved to ${categoryFolder}/${reg}/${field}. Linked database records updated.`);
                }

                loadJCCFiles(); 
            } catch(err) {
                alert("Authorisation Error:\n" + err.message + "\n\n(If you see 'Object not found', please check your Supabase Storage Policies to ensure you have UPDATE permissions on this bucket!)");
            }
        };

        window.rejectFile = async (filePath) => {
            const note = prompt("Please enter a reason for rejecting this document:");
            if (note === null) return;

            const cleanFilePath = filePath.replace(/\/+/g, '/').replace(/^\//, '');
            const fileName = cleanFilePath.split('/').pop();
            const cleanNewPath = `REJECTED/${fileName}`.replace(/\/+/g, '/').replace(/^\//, '');

            try {
                const { error: moveErr } = await supabaseClient.storage.from('maintenance_docs').move(cleanFilePath, cleanNewPath);
                if (moveErr) throw new Error(moveErr.message);

                if (note.trim() !== "") {
                    const noteBlob = new Blob([note], { type: 'text/plain' });
                    await supabaseClient.storage.from('maintenance_docs').upload(`${cleanNewPath}.note.txt`, noteBlob);
                }

                // Update sister app database to mark as rejected
                await supabaseClient.from('maintenance_records')
                    .update({ file_path: cleanNewPath, document_type: 'REJECTED' })
                    .eq('file_path', cleanFilePath);

                alert("File moved to Rejected folder.");
                loadJCCFiles();
            } catch(err) {
                alert("Rejection Error: " + err.message);
            }
        };

        window.addFileNote = async (filePath) => {
            const note = prompt("Enter a note for this file before processing:");
            if (!note || note.trim() === "") return;

            const cleanFilePath = filePath.replace(/\/+/g, '/').replace(/^\//, '');

            try {
                const noteBlob = new Blob([note], { type: 'text/plain' });
                const { error } = await supabaseClient.storage.from('maintenance_docs').upload(`${cleanFilePath}.note.txt`, noteBlob);
                
                if(error) throw error;
                alert("Note attached to file.");
                loadJCCFiles();
            } catch(err) {
                alert("Note Error: " + err.message);
            }
        };

        // --- FROST DOCS RENDERER ---
        async function loadJCCFiles() {
            const grid = document.getElementById('fleet-grid'); 
            const backBtn = document.getElementById('jcc-back');
            grid.innerHTML = '<p class="text-slate-500 italic">Accessing Frost Docs...</p>';
            
            updateBreadcrumbs();
            backBtn.classList.toggle('hidden', currentPath.length === 0);

            const folderPath = currentPath.join('/');
            const { data, error } = await supabaseClient.storage.from('maintenance_docs').list(folderPath, { limit: 100 });
            
            if (error) {
                grid.innerHTML = `<p class="text-rose-500">Error loading files: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                grid.innerHTML = '<p class="text-slate-500 italic">This directory is empty.</p>';
                return;
            }

            grid.innerHTML = data.filter(item => item.name !== '.emptyFolderPlaceholder').map(item => {
                const isFolder = !item.id;
                let dateDisplay = '';
                if (item.created_at) {
                    const dateObj = new Date(item.created_at);
                    const ukDate = dateObj.toLocaleDateString('en-GB');
                    const ukTime = dateObj.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    dateDisplay = `<p class="text-xs font-black text-slate-500 mt-0.5 uppercase">Added: ${ukDate} - ${ukTime}</p>`;
                }

                if (isFolder) {
                    return `
                        <div class="glass-card folder-card p-6 flex flex-col items-center gap-3" onclick="navigateDown('${item.name}')">
                            <span class="font-black text-lg uppercase">${item.name}</span>
                            <span class="text-[9px] font-bold text-slate-500 uppercase text-center">Open Folder</span>
                        </div>`;
                } else {
                    const fullFilePath = folderPath ? `${folderPath}/${item.name}` : item.name;
                    const { data: url } = supabaseClient.storage.from('maintenance_docs').getPublicUrl(fullFilePath);
                    
                    const parsedData = parseAuthFileName(item.name);
                    let displayName = parsedData ? parsedData.actualName : item.name;

                    let actionButtons = `<a href="${url.publicUrl}" target="_blank" class="w-full mt-4 bg-rose-600 text-white text-center py-2 rounded text-[9px] font-black uppercase">Open File</a>`;

                    // Using toUpperCase guarantees it catches AUTHORISE from either portal
                    if (folderPath.toUpperCase().includes('AUTHORIS') || parsedData) {
                        actionButtons = `
                            <div class="flex gap-1 mt-4">
                                <a href="${url.publicUrl}" target="_blank" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors flex items-center justify-center">View</a>
                                <button onclick="authoriseFile('${fullFilePath}')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">Auth</button>
                                <button onclick="rejectFile('${fullFilePath}')" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">Reject</button>
                                <button onclick="addFileNote('${fullFilePath}')" class="flex-1 bg-amber-500 hover:bg-amber-400 text-white text-center py-2 rounded text-[9px] font-black uppercase transition-colors">Note</button>
                            </div>
                        `;
                    }

                    return `
                        <div class="glass-card p-4 flex flex-col justify-between border-l-4 border-l-rose-600">
                            <div>
                                <h3 class="font-black text-xs uppercase break-all">${displayName}</h3>
                                ${dateDisplay}
                            </div>
                            ${actionButtons}
                        </div>`;
                }
            }).join('');
        }

        function navigateDown(folderName) {
            currentPath.push(folderName);
            loadJCCFiles();
        }

        function navigateUp() {
            if (currentPath.length > 0) {
                currentPath.pop();
                loadJCCFiles();
            }
        }

        function navigateToPathIndex(index) {
            currentPath = currentPath.slice(0, index + 1);
            loadJCCFiles();
        }

        function resetToRoot() {
            currentPath = [];
            loadJCCFiles();
        }

        function updateBreadcrumbs() {
            const container = document.getElementById('breadcrumb-container');
            let html = `<span class="breadcrumb-item" onclick="resetToRoot()">Frost Docs</span>`;
            currentPath.forEach((folder, index) => {
                html += ` <span class="text-slate-600">/</span> <span class="breadcrumb-item" onclick="navigateToPathIndex(${index})">${folder}</span>`;
            });
            container.innerHTML = html;
        }

        function filterJCC(query) {
            const cards = document.querySelectorAll('#fleet-grid .glass-card');
            cards.forEach(c => { c.style.display = c.innerText.toLowerCase().includes(query.toLowerCase()) ? 'flex' : 'none'; });
        }

        function getHealthStatus(v) {
            const pmiWk = getWeekNumber(v.pmi_due);
            if (pmiWk && pmiWk <= currentWeek) return 'plate-critical';
            if (!v.mot_due) return 'plate-ok';
            const motDiff = (new Date(v.mot_due) - new Date()) / 86400000;
            if (motDiff < 7) return 'plate-critical';
            if (motDiff < 14) return 'plate-warn';
            return 'plate-ok';
        }

        window.onload = () => { 
            document.getElementById('current-week-badge').innerText = `WEEK ${currentWeek}`;
            checkSession(); 
            
            const lastTab = localStorage.getItem('fts_current_tab');
            if (lastTab) switchTab(lastTab); 
        };
    </script>
</body>
</html>
